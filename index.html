<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경기 영상 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0A0A0A;
    --nav-bg-solid: rgba(15,15,15,0.96);
    --card: #181818;
    --text: #FFFFFF;
    --muted: #B3B3B3;
    --muted-2: #7A7A7A;
    --accent: #E1442F;
    --accent-dim: #A9331F;
    --line: #2C2C2C;
  }
  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0; background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  ::selection{ background: var(--accent); color: #fff; }
  ::-webkit-scrollbar{ height: 8px; width: 8px; }
  ::-webkit-scrollbar-thumb{ background: #333; border-radius: 4px; }
  a, button{ font-family: inherit; }

  /* -------- Top Nav -------- */
  .topnav{
    position: fixed; top:0; left:0; right:0; z-index: 100;
    display:flex; align-items:center; gap: 20px;
    padding: 16px 44px;
    background: linear-gradient(180deg, rgba(0,0,0,0.75) 0%, transparent 100%);
    transition: background .25s ease;
  }
  .topnav.solid{ background: var(--nav-bg-solid); }
  .brand{ font-weight: 800; font-size: 21px; letter-spacing: -0.02em; color: var(--accent); margin-right: 8px; white-space: nowrap; }
  .nav-search{
    flex: 1; max-width: 320px;
    display:flex; align-items:center; gap: 8px;
    background: rgba(0,0,0,0.55);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 12px;
  }
  .nav-search svg{ flex-shrink:0; opacity: .6; }
  .nav-search input{ background: transparent; border: none; outline: none; color: var(--text); font-size: 13.5px; width: 100%; }
  .nav-search input::placeholder{ color: var(--muted-2); }
  .nav-refresh{
    margin-left: auto;
    background: transparent; border: 1px solid var(--line); color: var(--muted);
    font-size: 12.5px; padding: 8px 14px; border-radius: 6px; cursor: pointer;
    white-space: nowrap; display:flex; align-items:center; gap:6px;
  }
  .nav-refresh:hover{ color: var(--text); border-color: var(--muted); }
  .nav-refresh.spinning svg{ animation: spin 0.9s linear infinite; }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .nav-updated{ font-size: 11px; color: var(--muted-2); margin-left: 10px; white-space: nowrap; }

  /* -------- Status banner -------- */
  .status-banner{
    position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
    z-index: 99; max-width: 560px; width: calc(100% - 32px);
    background: #1c1c1c; border: 1px solid var(--line); border-left: 3px solid var(--accent);
    border-radius: 8px; padding: 12px 16px;
    font-size: 13px; color: #ddd; line-height: 1.5;
    display:none;
  }
  .status-banner.show{ display:block; }
  .status-banner b{ color: var(--accent); }

  /* -------- Hero -------- */
  .hero{
    position: relative;
    height: 78vh; min-height: 420px;
    display:flex; align-items:flex-end;
    background-size: cover; background-position: center;
    margin-bottom: 8px;
    background-color: #111;
  }
  .hero::after{
    content:''; position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(10,10,10,0) 35%, rgba(10,10,10,0.55) 72%, var(--bg) 100%),
      linear-gradient(90deg, rgba(10,10,10,0.85) 0%, rgba(10,10,10,0.15) 55%, transparent 80%);
  }
  .hero-content{ position: relative; z-index: 2; padding: 0 44px 56px; max-width: 620px; }
  .hero-badge{
    display:inline-flex; align-items:center; gap: 6px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
    color: var(--accent); text-transform: uppercase; margin-bottom: 14px;
  }
  .hero-badge::before{ content: '●'; font-size: 8px; }
  .hero h1{
    font-size: clamp(28px, 4.4vw, 48px); font-weight: 800; line-height: 1.12; letter-spacing: -0.02em;
    margin: 0 0 14px; text-shadow: 0 2px 14px rgba(0,0,0,0.4);
  }
  .hero-meta{ display:flex; align-items:center; gap: 10px; margin-bottom: 14px; font-size: 13.5px; color: var(--muted); }
  .hero-meta .team-chip{ color: var(--text); background: rgba(255,255,255,0.12); padding: 3px 10px; border-radius: 4px; font-weight: 600; font-size: 12.5px; }
  .hero-desc{
    font-size: 15px; line-height: 1.6; color: #E5E5E5; margin: 0 0 22px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .hero-actions{ display:flex; gap: 12px; }
  .btn{ display:inline-flex; align-items:center; gap: 8px; font-weight: 700; font-size: 15px; padding: 11px 22px; border-radius: 6px; border: none; cursor: pointer; }
  .btn-play{ background: var(--text); color: #111; }
  .btn-play:hover{ background: #d8d8d8; }
  .btn-more{ background: rgba(109,109,110,0.5); color: var(--text); }
  .btn-more:hover{ background: rgba(109,109,110,0.75); }

  /* -------- Rows -------- */
  .rows{ padding: 6px 0 90px; }
  .row-block{ margin-bottom: 34px; }
  .row-head{ display:flex; align-items:baseline; gap: 10px; padding: 0 44px; margin-bottom: 10px; }
  .row-head h2{ font-size: 18px; font-weight: 700; margin: 0; }
  .row-head .row-count{ font-size: 12px; color: var(--muted-2); }
  .row-wrap{ position: relative; }
  .row-wrap:hover .row-arrow{ opacity: 1; }
  .row-scroll{ display:flex; gap: 6px; overflow-x: auto; scroll-behavior: smooth; padding: 4px 44px 12px; scrollbar-width: none; }
  .row-scroll::-webkit-scrollbar{ display:none; }
  .row-arrow{
    position:absolute; top:0; bottom: 12px; width: 44px;
    display:flex; align-items:center; justify-content:center;
    background: linear-gradient(90deg, var(--bg), transparent);
    border:none; color: var(--text); cursor:pointer;
    opacity: 0; transition: opacity .15s ease; z-index: 5; font-size: 22px;
  }
  .row-arrow.right{ right:0; background: linear-gradient(270deg, var(--bg), transparent); }
  .row-arrow.left{ left:0; }

  .vcard{ position: relative; flex: 0 0 260px; border-radius: 6px; overflow: hidden; background: var(--card); cursor: pointer; transition: transform .2s ease, z-index 0s; }
  .vcard:hover{ transform: scale(1.06); z-index: 3; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
  .vcard .thumb{ position:relative; aspect-ratio: 16/9; background:#000; }
  .vcard .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .vcard .thumb .play-hover{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background: rgba(0,0,0,0.25); opacity:0; transition: opacity .15s ease; }
  .vcard:hover .play-hover{ opacity:1; }
  .vcard-info{ padding: 9px 11px 11px; }
  .vcard-info .vtitle{ font-size: 13px; font-weight: 600; margin: 0 0 4px; color: var(--text); white-space: nowrap; overflow:hidden; text-overflow: ellipsis; }
  .vcard-info .vmeta{ display:flex; align-items:center; gap: 6px; font-size: 11px; color: var(--muted-2); }
  .vcard-info .vmeta .dot{ width:3px; height:3px; border-radius:50%; background: var(--muted-2); }

  .empty-row{ padding: 40px 44px; color: var(--muted); text-align:center; border: 1px dashed var(--line); border-radius: 10px; margin: 0 44px; }

  /* -------- Skeleton loading -------- */
  .skeleton{ background: linear-gradient(90deg, #161616 25%, #1f1f1f 37%, #161616 63%); background-size: 400% 100%; animation: shimmer 1.4s ease infinite; }
  @keyframes shimmer{ 0%{ background-position: 100% 50%; } 100%{ background-position: 0 50%; } }
  .skeleton-card{ flex: 0 0 260px; aspect-ratio: 16/9; border-radius: 6px; }

  /* -------- Player Modal -------- */
  .modal-overlay{
    position: fixed; inset:0; background: rgba(0,0,0,0.8);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition: opacity .18s ease; z-index: 200; padding: 24px;
  }
  .modal-overlay.show{ opacity:1; pointer-events:auto; }
  .modal-box{ background: #141414; width: min(880px, 100%); border-radius: 10px; overflow:hidden; transform: translateY(14px); transition: transform .18s ease; }
  .modal-overlay.show .modal-box{ transform: translateY(0); }
  .modal-video{ position:relative; aspect-ratio: 16/9; background:#000; }
  .modal-video iframe{ width:100%; height:100%; border:0; }
  .modal-close{
    position:absolute; top: 14px; right: 14px; z-index: 5;
    width: 34px; height: 34px; border-radius: 50%; border:none;
    background: rgba(20,20,20,0.85); color: var(--text); font-size: 16px; cursor:pointer;
  }
  .modal-info{ padding: 20px 26px 26px; }
  .modal-info h3{ margin: 0 0 8px; font-size: 21px; font-weight: 700; }
  .modal-info .modal-meta{ display:flex; gap:10px; align-items:center; color: var(--muted); font-size: 13px; margin-bottom: 10px; }
  .modal-info .modal-meta .team-chip{ color: var(--text); background: rgba(255,255,255,0.12); padding: 2px 9px; border-radius: 4px; font-weight:600; font-size:12px; }
  .modal-info p{ color: #d2d2d2; font-size: 14px; line-height: 1.6; margin:0; }

  @media (max-width: 640px){
    .topnav{ padding: 12px 16px; }
    .nav-search{ max-width: 140px; }
    .nav-updated{ display:none; }
    .hero-content, .row-head{ padding-left: 16px; padding-right: 16px; }
    .row-scroll{ padding-left: 16px; padding-right: 16px; }
    .hero{ height: 66vh; }
    .vcard, .skeleton-card{ flex-basis: 200px; }
  }
</style>
</head>
<body>

<nav class="topnav" id="topnav">
  <div class="brand" id="brandName">MATCHDAY</div>
  <div class="nav-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="영상 제목 검색">
  </div>
  <span class="nav-updated" id="navUpdated"></span>
  <button class="nav-refresh" id="refreshBtn" title="지금 새로고침">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 4v6h-6"/></svg>
    새로고침
  </button>
</nav>

<div class="status-banner" id="statusBanner"></div>

<section class="hero" id="hero">
  <div class="hero-content">
    <p class="hero-badge">최신 업로드</p>
    <h1 id="heroTitle">불러오는 중...</h1>
    <div class="hero-meta">
      <span class="team-chip" id="heroTeam">-</span>
      <span id="heroDate">-</span>
    </div>
    <p class="hero-desc" id="heroDesc"></p>
    <div class="hero-actions">
      <button class="btn btn-play" id="heroPlayBtn">▶ 재생</button>
      <button class="btn btn-more" id="heroMoreBtn">전체 영상 보기</button>
    </div>
  </div>
</section>

<div class="rows" id="rows"></div>

<div class="modal-overlay" id="playerOverlay">
  <div class="modal-box">
    <div class="modal-video" id="modalVideoWrap">
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-info">
      <h3 id="modalTitle">-</h3>
      <div class="modal-meta"><span class="team-chip" id="modalTeam">-</span><span id="modalDate">-</span></div>
      <p id="modalDesc"></p>
    </div>
  </div>
</div>

<script>
  // ---------- 설정 ----------
  const SITE_TITLE = "MATCHDAY"; // 원하는 팀/채널 이름으로 변경하세요
  document.getElementById('brandName').textContent = SITE_TITLE;
  document.title = SITE_TITLE + " · 경기 영상 아카이브";

  // 유튜브 Data API 키와 채널 ID (본인 채널 값으로 이미 반영됨)
  // 주의: 이 키가 페이지 소스에 그대로 노출되므로, Google Cloud Console에서
  // "HTTP 리퍼러" 제한을 걸어 본인 GitHub Pages 주소에서만 쓰이게 해두세요.
  const YT_API_KEY = 'AIzaSyCqyeeAGa_KzjoTpkYFyLuApdgE_Ppw5KI';
  const YT_CHANNEL = 'UCu7KZfrfGZ7g-e9R6sHS3-w';

  const STORAGE_KEY = 'team_video_archive_cache_v1';
  const TEAM_ORDER = ['Weekdays Futsal', 'ERC', 'Shootdori'];
  const TEAM_ALIASES = {
    'weekdays futsal': 'Weekdays Futsal',
    'weekdays futsa': 'Weekdays Futsal', // 흔한 오타 대응
    'wf': 'Weekdays Futsal',
    'erc': 'ERC',
    'shootdori': 'Shootdori'
  };

  function loadCache(){
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ try { return JSON.parse(raw); } catch(e){} }
    return null;
  }
  function saveCache(list, syncedAt){
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ videos: list, syncedAt }));
  }

  let videos = [];
  let searchTerm = '';
  let lastSyncedAt = null;

  function extractTeamFromPlaylistTitle(title){
    // 반각 [ ] 뿐 아니라 전각 [ ]（복사/붙여넣기 시 흔히 섞이는 문자）도 인식
    const m = title.match(/[\[\uFF3B]\s*([^\]\uFF3D]+?)\s*[\]\uFF3D]/);
    if(!m) return null;
    return m[1].trim().replace(/\s+/g, ' ');
  }
  function normalizeTeam(rawTeam, playlistTitle){
    if(playlistTitle && playlistTitle.includes('슛도리')) return 'Shootdori';
    if(!rawTeam) return null;
    const key = rawTeam.trim().toLowerCase().replace(/\s+/g, ' ');
    return TEAM_ALIASES[key] || null;
  }
  function fmtDate(d){
    const dt = new Date(d + 'T00:00:00');
    return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
  }
  function thumb(id){ return `https://img.youtube.com/vi/${id}/hqdefault.jpg`; }
  function visibleVideos(){ return videos.filter(v => TEAM_ORDER.includes(v.team)); }

  function showBanner(html){
    const b = document.getElementById('statusBanner');
    b.innerHTML = html;
    b.classList.add('show');
  }
  function hideBanner(){ document.getElementById('statusBanner').classList.remove('show'); }

  // ---------- YouTube 호출 ----------
  async function ytGet(url){
    const res = await fetch(url);
    const data = await res.json();
    if(data.error){ throw new Error(data.error.message || 'YouTube API 오류'); }
    return data;
  }
  async function resolveChannelId(){
    if(/^UC[a-zA-Z0-9_-]{20,}$/.test(YT_CHANNEL)) return YT_CHANNEL;
    const handle = YT_CHANNEL.startsWith('@') ? YT_CHANNEL : '@' + YT_CHANNEL;
    const data = await ytGet(`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${encodeURIComponent(handle)}&key=${YT_API_KEY}`);
    if(data.items && data.items.length) return data.items[0].id;
    throw new Error('채널을 찾을 수 없어요.');
  }
  async function fetchAllPlaylists(channelId){
    let playlists = [], pageToken = '', guard = 0;
    do {
      const url = `https://www.googleapis.com/youtube/v3/playlists?part=snippet,contentDetails&channelId=${channelId}&maxResults=50&key=${YT_API_KEY}${pageToken ? '&pageToken=' + pageToken : ''}`;
      const data = await ytGet(url);
      playlists = playlists.concat(data.items || []);
      pageToken = data.nextPageToken || '';
      guard++;
    } while(pageToken && guard < 10);
    return playlists;
  }
  async function fetchAllPlaylistItems(playlistId){
    let items = [], pageToken = '', guard = 0;
    do {
      const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${playlistId}&maxResults=50&key=${YT_API_KEY}${pageToken ? '&pageToken=' + pageToken : ''}`;
      const data = await ytGet(url);
      items = items.concat(data.items || []);
      pageToken = data.nextPageToken || '';
      guard++;
    } while(pageToken && guard < 10);
    return items;
  }

  async function fetchFromYoutube(){
    const channelId = await resolveChannelId();
    const playlists = await fetchAllPlaylists(channelId);

    const teamPlaylists = playlists
      .map(p => {
        const rawTeam = extractTeamFromPlaylistTitle(p.snippet.title);
        return { id: p.id, title: p.snippet.title, team: normalizeTeam(rawTeam, p.snippet.title) };
      })
      .filter(p => p.team);

    let result = [];
    for(const pl of teamPlaylists){
      const items = await fetchAllPlaylistItems(pl.id);
      items.forEach(item => {
        const s = item.snippet, cd = item.contentDetails;
        if(!s || !cd || !cd.videoId) return;
        if(s.title === 'Private video' || s.title === 'Deleted video') return;
        const dateStr = (cd.videoPublishedAt || s.publishedAt || '').slice(0, 10);
        result.push({
          id: 'yt_' + cd.videoId,
          title: s.title,
          team: pl.team,
          date: dateStr,
          youtubeId: cd.videoId,
          desc: s.description ? s.description.split('\n')[0].slice(0, 160) : ''
        });
      });
    }
    const dedup = {};
    result.forEach(v => { dedup[v.youtubeId] = v; });
    return Object.values(dedup);
  }

  async function runSync(isManual){
    const refreshBtn = document.getElementById('refreshBtn');
    refreshBtn.classList.add('spinning');
    if(isManual) hideBanner();
    try{
      const fresh = await fetchFromYoutube();
      if(!fresh.length){
        showBanner('<b>알림</b> 재생목록 제목에서 ERC / Shootdori / Weekdays Futsal로 인식되는 영상을 찾지 못했어요. 재생목록이 공개(Public)로 설정돼 있는지 확인해 주세요.');
      } else {
        hideBanner();
      }
      videos = fresh;
      lastSyncedAt = new Date().toISOString();
      saveCache(fresh, lastSyncedAt);
      render();
    } catch(err){
      showBanner(`<b>불러오기 실패</b> ${err.message}${videos.length ? ' — 이전에 저장된 데이터를 표시하고 있어요.' : ''}`);
    } finally {
      refreshBtn.classList.remove('spinning');
      updateNavTimestamp();
    }
  }

  function updateNavTimestamp(){
    const el = document.getElementById('navUpdated');
    el.textContent = lastSyncedAt ? `업데이트: ${fmtDate(lastSyncedAt.slice(0,10))}` : '';
  }

  // ---------- Hero ----------
  function renderHero(){
    const sorted = visibleVideos().slice().sort((a,b) => b.date.localeCompare(a.date));
    const hero = document.getElementById('hero');
    if(!sorted.length){
      hero.style.backgroundImage = '';
      document.getElementById('heroTitle').textContent = videos.length === 0 && !lastSyncedAt ? '불러오는 중...' : '표시할 영상이 없어요';
      document.getElementById('heroTeam').textContent = '-';
      document.getElementById('heroDate').textContent = '-';
      document.getElementById('heroDesc').textContent = '';
      return null;
    }
    const v = sorted[0];
    hero.style.backgroundImage = `url(${thumb(v.youtubeId)})`;
    document.getElementById('heroTitle').textContent = v.title;
    document.getElementById('heroTeam').textContent = v.team;
    document.getElementById('heroDate').textContent = fmtDate(v.date);
    document.getElementById('heroDesc').textContent = v.desc || '';
    return v;
  }

  // ---------- Rows ----------
  function teamOrderList(){
    const present = Array.from(new Set(visibleVideos().map(v => v.team)));
    return TEAM_ORDER.filter(t => present.includes(t));
  }

  function makeCard(v){
    const card = document.createElement('div');
    card.className = 'vcard';
    card.innerHTML = `
      <div class="thumb">
        <img src="${thumb(v.youtubeId)}" alt="${v.title}" loading="lazy">
        <div class="play-hover">
          <svg width="40" height="40" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.9)" stroke-width="1.2"/><path d="M10 8.5L16 12L10 15.5V8.5Z" fill="#fff"/></svg>
        </div>
      </div>
      <div class="vcard-info">
        <p class="vtitle">${v.title}</p>
        <div class="vmeta"><span>${v.team}</span><span class="dot"></span><span>${fmtDate(v.date)}</span></div>
      </div>
    `;
    card.querySelector('.thumb').addEventListener('click', () => openPlayer(v));
    return card;
  }

  function makeRow(title, list, rowId){
    const block = document.createElement('div');
    block.className = 'row-block';
    block.innerHTML = `
      <div class="row-head"><h2>${title}</h2><span class="row-count">${list.length}개</span></div>
      <div class="row-wrap">
        <button class="row-arrow left" data-row="${rowId}">‹</button>
        <div class="row-scroll" id="scroll-${rowId}"></div>
        <button class="row-arrow right" data-row="${rowId}">›</button>
      </div>
    `;
    const scrollEl = block.querySelector('.row-scroll');
    if(list.length){
      list.forEach(v => scrollEl.appendChild(makeCard(v)));
    } else {
      const empty = document.createElement('div');
      empty.className = 'empty-row';
      empty.textContent = '아직 등록된 영상이 없어요.';
      scrollEl.replaceWith(empty);
    }
    block.querySelectorAll('.row-arrow').forEach(btn => {
      btn.onclick = () => {
        const s = document.getElementById('scroll-' + rowId);
        if(!s) return;
        const dir = btn.classList.contains('right') ? 1 : -1;
        s.scrollBy({ left: dir * (s.clientWidth * 0.9), behavior: 'smooth' });
      };
    });
    return block;
  }

  function makeSkeletonRow(title){
    const block = document.createElement('div');
    block.className = 'row-block';
    const cards = Array.from({length: 5}).map(() => '<div class="vcard skeleton skeleton-card"></div>').join('');
    block.innerHTML = `
      <div class="row-head"><h2>${title}</h2></div>
      <div class="row-scroll" style="overflow:hidden;">${cards}</div>
    `;
    return block;
  }

  function renderRows(){
    const rowsEl = document.getElementById('rows');
    rowsEl.innerHTML = '';

    if(!videos.length && !lastSyncedAt){
      TEAM_ORDER.forEach(t => rowsEl.appendChild(makeSkeletonRow(t)));
      return;
    }

    const pool = visibleVideos();

    if(searchTerm.trim()){
      const filtered = pool.filter(v => v.title.toLowerCase().includes(searchTerm.toLowerCase()))
        .sort((a,b) => b.date.localeCompare(a.date));
      rowsEl.appendChild(makeRow(`"${searchTerm}" 검색 결과`, filtered, 'search'));
      return;
    }

    const latest = pool.slice().sort((a,b) => b.date.localeCompare(a.date)).slice(0, 12);
    rowsEl.appendChild(makeRow('최신 업로드', latest, 'latest'));

    teamOrderList().forEach((team, i) => {
      const list = pool.filter(v => v.team === team).sort((a,b) => b.date.localeCompare(a.date));
      rowsEl.appendChild(makeRow(team, list, 'team' + i));
    });
  }

  function render(){
    const heroVideo = renderHero();
    renderRows();
    document.getElementById('heroPlayBtn').onclick = () => { if(heroVideo) openPlayer(heroVideo); };
  }

  document.getElementById('heroMoreBtn').onclick = () => {
    const first = document.querySelector('.row-block');
    if(first) first.scrollIntoView({ behavior: 'smooth' });
  };

  // ---------- Search ----------
  document.getElementById('searchInput').addEventListener('input', e => {
    searchTerm = e.target.value;
    renderRows();
  });

  // ---------- Nav scroll state ----------
  window.addEventListener('scroll', () => {
    document.getElementById('topnav').classList.toggle('solid', window.scrollY > 40);
  });

  // ---------- Player Modal ----------
  const playerOverlay = document.getElementById('playerOverlay');
  const modalVideoWrap = document.getElementById('modalVideoWrap');
  function openPlayer(v){
    modalVideoWrap.innerHTML = `<button class="modal-close" id="modalClose">✕</button><iframe src="https://www.youtube.com/embed/${v.youtubeId}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
    document.getElementById('modalClose').onclick = closePlayer;
    document.getElementById('modalTitle').textContent = v.title;
    document.getElementById('modalTeam').textContent = v.team;
    document.getElementById('modalDate').textContent = fmtDate(v.date);
    document.getElementById('modalDesc').textContent = v.desc || '';
    playerOverlay.classList.add('show');
  }
  function closePlayer(){
    playerOverlay.classList.remove('show');
    modalVideoWrap.innerHTML = `<button class="modal-close" id="modalClose">✕</button>`;
  }
  playerOverlay.addEventListener('click', e => { if(e.target === playerOverlay) closePlayer(); });
  document.addEventListener('keydown', e => { if(e.key === 'Escape') closePlayer(); });

  // ---------- 새로고침 버튼 ----------
  document.getElementById('refreshBtn').onclick = () => runSync(true);

  // ---------- 초기 로드 ----------
  (function init(){
    const cached = loadCache();
    if(cached && cached.videos && cached.videos.length){
      videos = cached.videos;
      lastSyncedAt = cached.syncedAt;
      updateNavTimestamp();
      render();
    }
    runSync(false);
  })();
</script>
</body>
</html>
