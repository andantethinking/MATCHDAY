<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경기 영상 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0A0A0A;
    --nav-bg-solid: rgba(15,15,15,0.96);
    --card: #181818;
    --text: #FFFFFF;
    --muted: #B3B3B3;
    --muted-2: #7A7A7A;
    --accent: #E1442F;
    --accent-dim: #A9331F;
    --line: #2C2C2C;
  }
  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0; background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  ::selection{ background: var(--accent); color: #fff; }
  ::-webkit-scrollbar{ height: 8px; width: 8px; }
  ::-webkit-scrollbar-thumb{ background: #333; border-radius: 4px; }

  a, button{ font-family: inherit; }

  /* -------- Top Nav -------- */
  .topnav{
    position: fixed; top:0; left:0; right:0; z-index: 100;
    display:flex; align-items:center; gap: 20px;
    padding: 16px 44px;
    background: linear-gradient(180deg, rgba(0,0,0,0.75) 0%, transparent 100%);
    transition: background .25s ease;
  }
  .topnav.solid{ background: var(--nav-bg-solid); }
  .brand{
    font-weight: 800; font-size: 21px; letter-spacing: -0.02em;
    color: var(--accent);
    margin-right: 8px;
    white-space: nowrap;
  }
  .nav-search{
    flex: 1; max-width: 320px;
    display:flex; align-items:center; gap: 8px;
    background: rgba(0,0,0,0.55);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 12px;
  }
  .nav-search svg{ flex-shrink:0; opacity: .6; }
  .nav-search input{
    background: transparent; border: none; outline: none; color: var(--text);
    font-size: 13.5px; width: 100%;
  }
  .nav-search input::placeholder{ color: var(--muted-2); }
  .nav-admin{
    margin-left: auto;
    background: transparent; border: 1px solid var(--line); color: var(--muted);
    font-size: 12.5px; padding: 8px 14px; border-radius: 6px; cursor: pointer;
    white-space: nowrap;
  }
  .nav-admin:hover{ color: var(--text); border-color: var(--muted); }
  .nav-admin.on{ color: var(--accent); border-color: var(--accent); background: rgba(225,68,47,0.1); }

  /* -------- Hero -------- */
  .hero{
    position: relative;
    height: 78vh; min-height: 420px;
    display:flex; align-items:flex-end;
    background-size: cover; background-position: center;
    margin-bottom: 8px;
  }
  .hero::after{
    content:''; position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(10,10,10,0) 35%, rgba(10,10,10,0.55) 72%, var(--bg) 100%),
      linear-gradient(90deg, rgba(10,10,10,0.85) 0%, rgba(10,10,10,0.15) 55%, transparent 80%);
  }
  .hero-content{
    position: relative; z-index: 2;
    padding: 0 44px 56px;
    max-width: 620px;
  }
  .hero-badge{
    display:inline-flex; align-items:center; gap: 6px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
    color: var(--accent); text-transform: uppercase;
    margin-bottom: 14px;
  }
  .hero-badge::before{ content: '●'; font-size: 8px; }
  .hero h1{
    font-size: clamp(28px, 4.4vw, 48px);
    font-weight: 800; line-height: 1.12; letter-spacing: -0.02em;
    margin: 0 0 14px;
    text-shadow: 0 2px 14px rgba(0,0,0,0.4);
  }
  .hero-meta{
    display:flex; align-items:center; gap: 10px; margin-bottom: 14px;
    font-size: 13.5px; color: var(--muted);
  }
  .hero-meta .team-chip{
    color: var(--text); background: rgba(255,255,255,0.12);
    padding: 3px 10px; border-radius: 4px; font-weight: 600; font-size: 12.5px;
  }
  .hero-desc{
    font-size: 15px; line-height: 1.6; color: #E5E5E5;
    margin: 0 0 22px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .hero-actions{ display:flex; gap: 12px; }
  .btn{
    display:inline-flex; align-items:center; gap: 8px;
    font-weight: 700; font-size: 15px;
    padding: 11px 22px; border-radius: 6px; border: none; cursor: pointer;
  }
  .btn-play{ background: var(--text); color: #111; }
  .btn-play:hover{ background: #d8d8d8; }
  .btn-more{ background: rgba(109,109,110,0.5); color: var(--text); }
  .btn-more:hover{ background: rgba(109,109,110,0.75); }

  /* -------- Rows -------- */
  .rows{ padding: 6px 0 90px; }
  .row-block{ margin-bottom: 34px; }
  .row-head{
    display:flex; align-items:baseline; gap: 10px;
    padding: 0 44px; margin-bottom: 10px;
  }
  .row-head h2{ font-size: 18px; font-weight: 700; margin: 0; }
  .row-head .row-count{ font-size: 12px; color: var(--muted-2); }
  .row-wrap{ position: relative; }
  .row-wrap:hover .row-arrow{ opacity: 1; }
  .row-scroll{
    display:flex; gap: 6px;
    overflow-x: auto; scroll-behavior: smooth;
    padding: 4px 44px 12px;
    scrollbar-width: none;
  }
  .row-scroll::-webkit-scrollbar{ display:none; }
  .row-arrow{
    position:absolute; top:0; bottom: 12px; width: 44px;
    display:flex; align-items:center; justify-content:center;
    background: linear-gradient(90deg, var(--bg), transparent);
    border:none; color: var(--text); cursor:pointer;
    opacity: 0; transition: opacity .15s ease;
    z-index: 5; font-size: 22px;
  }
  .row-arrow.right{ right:0; background: linear-gradient(270deg, var(--bg), transparent); }
  .row-arrow.left{ left:0; }

  .vcard{
    position: relative;
    flex: 0 0 260px;
    border-radius: 6px;
    overflow: hidden;
    background: var(--card);
    cursor: pointer;
    transition: transform .2s ease, z-index 0s;
  }
  .vcard:hover{ transform: scale(1.06); z-index: 3; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
  .vcard .thumb{ position:relative; aspect-ratio: 16/9; background:#000; }
  .vcard .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .vcard .thumb .play-hover{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background: rgba(0,0,0,0.25); opacity:0; transition: opacity .15s ease;
  }
  .vcard:hover .play-hover{ opacity:1; }
  .vcard-info{ padding: 9px 11px 11px; }
  .vcard-info .vtitle{
    font-size: 13px; font-weight: 600; margin: 0 0 4px; color: var(--text);
    white-space: nowrap; overflow:hidden; text-overflow: ellipsis;
  }
  .vcard-info .vmeta{ display:flex; align-items:center; gap: 6px; font-size: 11px; color: var(--muted-2); }
  .vcard-info .vmeta .dot{ width:3px; height:3px; border-radius:50%; background: var(--muted-2); }
  .vcard-admin{
    position:absolute; top: 6px; right: 6px; display:flex; gap: 4px; z-index: 4;
  }
  .vcard-admin button{
    width: 26px; height: 26px; border-radius: 5px; border:none; cursor:pointer;
    background: rgba(0,0,0,0.72); color: var(--text); font-size: 12px;
    display:flex; align-items:center; justify-content:center;
  }
  .vcard-admin button.del:hover{ background: var(--accent); }
  .vcard-admin button.edit:hover{ background: #444; }

  .empty-row{
    padding: 40px 44px; color: var(--muted); text-align:center;
    border: 1px dashed var(--line); border-radius: 10px; margin: 0 44px;
  }

  /* -------- Player Modal -------- */
  .modal-overlay{
    position: fixed; inset:0; background: rgba(0,0,0,0.8);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition: opacity .18s ease; z-index: 200;
    padding: 24px;
  }
  .modal-overlay.show{ opacity:1; pointer-events:auto; }
  .modal-box{
    background: #141414; width: min(880px, 100%); border-radius: 10px; overflow:hidden;
    transform: translateY(14px); transition: transform .18s ease;
  }
  .modal-overlay.show .modal-box{ transform: translateY(0); }
  .modal-video{ position:relative; aspect-ratio: 16/9; background:#000; }
  .modal-video iframe{ width:100%; height:100%; border:0; }
  .modal-close{
    position:absolute; top: 14px; right: 14px; z-index: 5;
    width: 34px; height: 34px; border-radius: 50%; border:none;
    background: rgba(20,20,20,0.85); color: var(--text); font-size: 16px; cursor:pointer;
  }
  .modal-info{ padding: 20px 26px 26px; }
  .modal-info h3{ margin: 0 0 8px; font-size: 21px; font-weight: 700; }
  .modal-info .modal-meta{ display:flex; gap:10px; align-items:center; color: var(--muted); font-size: 13px; margin-bottom: 10px; }
  .modal-info .modal-meta .team-chip{ color: var(--text); background: rgba(255,255,255,0.12); padding: 2px 9px; border-radius: 4px; font-weight:600; font-size:12px; }
  .modal-info p{ color: #d2d2d2; font-size: 14px; line-height: 1.6; margin:0; }

  /* -------- Admin Panel -------- */
  .admin-panel{
    position: fixed; top: 0; right: -420px; width: 400px; height: 100vh;
    background: #141414; border-left: 1px solid var(--line);
    padding: 26px 22px; overflow-y:auto; transition: right .25s ease; z-index: 150;
  }
  .admin-panel.open{ right: 0; }
  .admin-panel h2{ font-size: 19px; font-weight: 800; margin: 0 0 4px; color: var(--accent); }
  .admin-panel .hint{ font-size: 12px; color: var(--muted-2); margin: 0 0 20px; line-height: 1.5; }
  .field{ margin-bottom: 14px; }
  .field label{ display:block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .field input, .field textarea, .field select{
    width: 100%; background: #0f0f0f; border: 1px solid var(--line);
    color: var(--text); padding: 9px 11px; border-radius: 6px; font-size: 13.5px; outline:none;
  }
  .field input:focus, .field textarea:focus, .field select:focus{ border-color: var(--accent); }
  .field textarea{ resize: vertical; min-height: 54px; }
  .btn-primary{ background: var(--accent); color:#fff; width:100%; font-weight:700; border:none; padding:10px 16px; border-radius:6px; cursor:pointer; font-size: 13.5px; }
  .btn-primary:hover{ background: var(--accent-dim); }
  .btn-ghost{ background: transparent; border: 1px solid var(--line); color: var(--muted); padding: 10px 14px; border-radius:6px; cursor:pointer; font-size: 13px; }
  .btn-ghost:hover{ color: var(--text); }
  .admin-divider{ height:1px; background: var(--line); margin: 20px 0; }
  .io-row{ display:flex; gap: 8px; }
  .io-row .btn-ghost{ flex:1; text-align:center; }
  .close-admin{ position:absolute; top:20px; right:20px; background:none; border:none; color: var(--muted); font-size:20px; cursor:pointer; }
  #fileImport{ display:none; }
  .panel-overlay{ position: fixed; inset:0; background: rgba(0,0,0,0.4); opacity:0; pointer-events:none; transition: opacity .2s ease; z-index: 140; }
  .panel-overlay.show{ opacity:1; pointer-events:auto; }

  @media (max-width: 640px){
    .topnav{ padding: 12px 16px; }
    .nav-search{ max-width: 140px; }
    .hero-content, .row-head{ padding-left: 16px; padding-right: 16px; }
    .row-scroll{ padding-left: 16px; padding-right: 16px; }
    .hero{ height: 66vh; }
    .vcard{ flex-basis: 200px; }
    .admin-panel{ width: 100%; right: -100%; }
  }
</style>
</head>
<body>

<nav class="topnav" id="topnav">
  <div class="brand" id="brandName">MATCHDAY</div>
  <div class="nav-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="영상 제목 검색">
  </div>
  <button class="nav-admin" id="adminToggle">⚙ 관리자</button>
</nav>

<section class="hero" id="hero">
  <div class="hero-content">
    <p class="hero-badge">최신 업로드</p>
    <h1 id="heroTitle">-</h1>
    <div class="hero-meta">
      <span class="team-chip" id="heroTeam">-</span>
      <span id="heroDate">-</span>
    </div>
    <p class="hero-desc" id="heroDesc"></p>
    <div class="hero-actions">
      <button class="btn btn-play" id="heroPlayBtn">▶ 재생</button>
      <button class="btn btn-more" id="heroMoreBtn">전체 영상 보기</button>
    </div>
  </div>
</section>

<div class="rows" id="rows"></div>

<div class="modal-overlay" id="playerOverlay">
  <div class="modal-box">
    <div class="modal-video" id="modalVideoWrap">
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-info">
      <h3 id="modalTitle">-</h3>
      <div class="modal-meta"><span class="team-chip" id="modalTeam">-</span><span id="modalDate">-</span></div>
      <p id="modalDesc"></p>
    </div>
  </div>
</div>

<div class="panel-overlay" id="panelOverlay"></div>
<div class="admin-panel" id="adminPanel">
  <button class="close-admin" id="closeAdmin">✕</button>
  <h2>관리자 모드</h2>
  <p class="hint">추가/수정 내용은 이 브라우저에만 저장돼요. 다른 기기나 배포본에 반영하려면 내보내기(JSON) 후 코드의 SEED_DATA에 반영하거나, 팀원에게 파일을 공유해 불러오기 해주세요.</p>

  <h2 style="font-size:15px; margin-top:0;">유튜브 자동 동기화</h2>
  <p class="hint">재생목록 제목의 <code style="color:#ddd;">[팀명]</code> 표기를 자동으로 읽어와 팀별로 분류해요. 예: <code style="color:#ddd;">[ERC] 2026 상반기</code></p>
  <div class="field">
    <label>YouTube Data API 키</label>
    <input type="text" id="ytApiKey" placeholder="AIza로 시작하는 키">
  </div>
  <div class="field">
    <label>채널 ID 또는 @핸들</label>
    <input type="text" id="ytChannel" placeholder="UCxxxxxxxx 또는 @채널핸들">
  </div>
  <button type="button" class="btn-primary" id="syncBtn" style="background:#1f6feb;">지금 동기화</button>
  <p class="hint" id="syncStatus" style="margin-top:8px;">아직 동기화한 적 없어요.</p>
  <div id="syncLog" style="font-size:11.5px; color:var(--muted-2); line-height:1.6; margin-top:6px; display:none;"></div>

  <div class="admin-divider"></div>
  <h2 style="font-size:15px;">영상 직접 추가</h2>
  <form id="videoForm">
    <input type="hidden" id="editId">
    <div class="field">
      <label>제목</label>
      <input type="text" id="fTitle" required placeholder="예: 6월 정기전 하이라이트">
    </div>
    <div class="field">
      <label>팀</label>
      <select id="fTeam" required>
        <option value="Weekdays Futsal">Weekdays Futsal</option>
        <option value="ERC">ERC</option>
        <option value="Shootdori">Shootdori</option>
        <option value="__custom">기타 (직접 입력)</option>
      </select>
    </div>
    <div class="field" id="customTeamField" style="display:none;">
      <label>팀 이름 직접 입력</label>
      <input type="text" id="fTeamCustom" placeholder="새 팀 이름">
    </div>
    <div class="field">
      <label>날짜</label>
      <input type="date" id="fDate" required>
    </div>
    <div class="field">
      <label>유튜브 URL 또는 영상 ID</label>
      <input type="text" id="fUrl" required placeholder="https://youtu.be/xxxxxxxxxxx">
    </div>
    <div class="field">
      <label>설명 (선택)</label>
      <textarea id="fDesc" placeholder="경기 요약이나 하이라이트 메모"></textarea>
    </div>
    <button type="submit" class="btn-primary" id="submitBtn">영상 추가</button>
  </form>

  <div class="admin-divider"></div>
  <div class="io-row">
    <button class="btn-ghost" id="exportBtn">내보내기 (JSON)</button>
    <button class="btn-ghost" id="importBtn">불러오기 (JSON)</button>
  </div>
  <input type="file" id="fileImport" accept="application/json">
  <div class="admin-divider"></div>
  <button class="btn-ghost" id="resetBtn" style="width:100%; color:var(--accent); border-color: var(--accent);">전체 데이터 초기화</button>
</div>

<script>
  // ---------- 설정 ----------
  const SITE_TITLE = "MATCHDAY"; // 원하는 팀/채널 이름으로 변경하세요
  document.getElementById('brandName').textContent = SITE_TITLE;
  document.title = SITE_TITLE + " · 경기 영상 아카이브";

  const STORAGE_KEY = 'team_video_archive_netflix_v1';
  const TEAM_ORDER = ['Weekdays Futsal', 'ERC', 'Shootdori'];

  const SEED_DATA = [
    { id: 's1', title: 'ERC 6월 정기전 풀영상', team: 'ERC', date: '2026-06-28', youtubeId: 'dQw4w9WgXcQ', desc: '예시 영상입니다. 관리자 모드에서 실제 영상 링크로 교체해 주세요.' },
    { id: 's2', title: 'ERC vs 인근팀 친선경기', team: 'ERC', date: '2026-06-11', youtubeId: 'dQw4w9WgXcQ', desc: '예시 영상입니다.' },
    { id: 's3', title: 'ERC 5월 리그전 하이라이트', team: 'ERC', date: '2026-05-23', youtubeId: 'dQw4w9WgXcQ', desc: '예시 영상입니다.' },
    { id: 's4', title: 'Weekdays Futsal 평일 정기전', team: 'Weekdays Futsal', date: '2026-06-20', youtubeId: 'dQw4w9WgXcQ', desc: '예시 영상입니다.' },
    { id: 's5', title: 'Weekdays Futsal 6월 2주차', team: 'Weekdays Futsal', date: '2026-06-06', youtubeId: 'dQw4w9WgXcQ', desc: '예시 영상입니다.' },
    { id: 's6', title: 'Weekdays Futsal 5월 풋살 매치', team: 'Weekdays Futsal', date: '2026-05-16', youtubeId: 'dQw4w9WgXcQ', desc: '예시 영상입니다.' },
    { id: 's7', title: 'Weekdays Futsal 4월 정기전', team: 'Weekdays Futsal', date: '2026-04-25', youtubeId: 'dQw4w9WgXcQ', desc: '예시 영상입니다.' },
    { id: 's8', title: 'Shootdori 매치데이 하이라이트', team: 'Shootdori', date: '2026-06-18', youtubeId: 'dQw4w9WgXcQ', desc: '예시 영상입니다.' },
    { id: 's9', title: 'Shootdori 6월 초 경기', team: 'Shootdori', date: '2026-06-02', youtubeId: 'dQw4w9WgXcQ', desc: '예시 영상입니다.' },
    { id: 's10', title: 'Shootdori 5월 정기전', team: 'Shootdori', date: '2026-05-10', youtubeId: 'dQw4w9WgXcQ', desc: '예시 영상입니다.' }
  ];

  function loadData(){
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ try { return JSON.parse(raw); } catch(e){} }
    return SEED_DATA;
  }
  function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(videos)); }

  const CONFIG_KEY = 'team_video_archive_yt_config_v1';
  function loadConfig(){
    const raw = localStorage.getItem(CONFIG_KEY);
    if(raw){ try { return JSON.parse(raw); } catch(e){} }
    return { apiKey: '', channel: '', lastSync: null, hasSynced: false };
  }
  function saveConfig(cfg){ localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); }
  let ytConfig = loadConfig();

  let videos = loadData();
  let searchTerm = '';
  let adminMode = false;

  // ---------- YouTube 자동 동기화 ----------
  function extractTeamFromPlaylistTitle(title){
    // 반각 [ ] 뿐 아니라 전각 [ ]（복사/붙여넣기 시 흔히 섞이는 문자）도 인식
    const m = title.match(/[\[\uFF3B]\s*([^\]\uFF3D]+?)\s*[\]\uFF3D]/);
    if(!m) return null;
    return m[1].trim().replace(/\s+/g, ' ');
  }

  async function ytGet(url){
    const res = await fetch(url);
    const data = await res.json();
    if(data.error){ throw new Error(data.error.message || 'YouTube API 오류'); }
    return data;
  }

  async function resolveChannelId(apiKey, channelInput){
    channelInput = channelInput.trim();
    if(/^UC[a-zA-Z0-9_-]{20,}$/.test(channelInput)) return channelInput;
    const handle = channelInput.startsWith('@') ? channelInput : '@' + channelInput;
    const data = await ytGet(`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${encodeURIComponent(handle)}&key=${apiKey}`);
    if(data.items && data.items.length) return data.items[0].id;
    throw new Error('채널을 찾을 수 없어요. 채널 ID(UC로 시작) 또는 @핸들을 확인해 주세요.');
  }

  async function fetchAllPlaylists(apiKey, channelId){
    let playlists = [];
    let pageToken = '';
    let guard = 0;
    do {
      const url = `https://www.googleapis.com/youtube/v3/playlists?part=snippet,contentDetails&channelId=${channelId}&maxResults=50&key=${apiKey}${pageToken ? '&pageToken=' + pageToken : ''}`;
      const data = await ytGet(url);
      playlists = playlists.concat(data.items || []);
      pageToken = data.nextPageToken || '';
      guard++;
    } while(pageToken && guard < 10);
    return playlists;
  }

  async function fetchAllPlaylistItems(apiKey, playlistId){
    let items = [];
    let pageToken = '';
    let guard = 0;
    do {
      const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${playlistId}&maxResults=50&key=${apiKey}${pageToken ? '&pageToken=' + pageToken : ''}`;
      const data = await ytGet(url);
      items = items.concat(data.items || []);
      pageToken = data.nextPageToken || '';
      guard++;
    } while(pageToken && guard < 10);
    return items;
  }

  async function syncFromYoutube(){
    const apiKey = document.getElementById('ytApiKey').value.trim();
    const channelInput = document.getElementById('ytChannel').value.trim();
    const statusEl = document.getElementById('syncStatus');
    const logEl = document.getElementById('syncLog');
    logEl.style.display = 'none'; logEl.innerHTML = '';
    if(!apiKey || !channelInput){
      statusEl.textContent = 'API 키와 채널 정보를 모두 입력해 주세요.';
      return;
    }
    ytConfig = { ...ytConfig, apiKey, channel: channelInput };
    saveConfig(ytConfig);

    statusEl.textContent = '채널 확인 중...';
    try{
      const channelId = await resolveChannelId(apiKey, channelInput);
      statusEl.textContent = '재생목록 불러오는 중...';
      const playlists = await fetchAllPlaylists(apiKey, channelId);

      const parsed = playlists.map(p => ({
        id: p.id,
        title: p.snippet.title,
        team: extractTeamFromPlaylistTitle(p.snippet.title),
        count: (p.contentDetails && p.contentDetails.itemCount) ?? null
      }));
      const teamPlaylists = parsed.filter(p => p.team);

      // 진단 로그: 채널에서 발견한 모든 재생목록과 매칭 여부
      logEl.style.display = 'block';
      logEl.innerHTML = '<b style="color:#ccc;">발견한 재생목록 (' + parsed.length + '개)</b><br>' +
        parsed.map(p => `${p.team ? '✅' : '⬜️'} ${p.title} (${p.count ?? '?'}개) ${p.team ? '→ [' + p.team + ']' : '(팀명 없음, 건너뜀)'}`).join('<br>');

      if(!parsed.length){
        statusEl.textContent = '이 채널에서 재생목록을 찾지 못했어요. 채널 ID가 맞는지, 재생목록이 공개(Public)로 설정돼 있는지 확인해 주세요.';
        return;
      }
      if(!teamPlaylists.length){
        statusEl.textContent = '재생목록은 찾았지만 제목에 [팀명] 형식이 없어요. 아래 목록을 확인해 주세요.';
        return;
      }

      let synced = [];
      for(const pl of teamPlaylists){
        statusEl.textContent = `"${pl.title}" 불러오는 중...`;
        const items = await fetchAllPlaylistItems(apiKey, pl.id);
        items.forEach(item => {
          const s = item.snippet;
          const cd = item.contentDetails;
          if(!s || !cd || !cd.videoId) return;
          if(s.title === 'Private video' || s.title === 'Deleted video') return;
          const dateStr = (cd.videoPublishedAt || s.publishedAt || '').slice(0, 10);
          synced.push({
            id: 'yt_' + cd.videoId,
            title: s.title,
            team: pl.team,
            date: dateStr,
            youtubeId: cd.videoId,
            desc: s.description ? s.description.split('\n')[0].slice(0, 160) : '',
            source: 'yt'
          });
        });
      }

      // 중복 videoId 제거 (같은 영상이 여러 재생목록에 있을 경우 최신 것 유지)
      const dedup = {};
      synced.forEach(v => { dedup[v.youtubeId] = v; });
      synced = Object.values(dedup);

      if(!synced.length){
        statusEl.textContent = '팀명이 매칭된 재생목록은 있었지만, 그 안에 공개 영상이 없었어요. 재생목록/영상이 비공개나 미등록 상태는 아닌지 확인해 주세요.';
        return;
      }

      // 수동으로 추가한 영상(source !== 'yt')은 보존, 기존 yt 동기화 데이터는 교체
      const manual = videos.filter(v => v.source !== 'yt');
      videos = [...manual, ...synced];
      saveData();

      ytConfig.lastSync = new Date().toISOString();
      ytConfig.hasSynced = true;
      saveConfig(ytConfig);
      statusEl.textContent = `동기화 완료: ${synced.length}개 영상 (${teamPlaylists.length}개 재생목록) · ${fmtDate(ytConfig.lastSync.slice(0,10))}`;
      render();
    } catch(err){
      statusEl.textContent = '동기화 실패: ' + err.message;
    }
  }

  function extractYoutubeId(input){
    input = input.trim();
    if(/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
    const patterns = [
      /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
      /(?:youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/,
      /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
      /(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/
    ];
    for(const p of patterns){ const m = input.match(p); if(m) return m[1]; }
    return null;
  }
  function fmtDate(d){
    const dt = new Date(d + 'T00:00:00');
    return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
  }
  function thumb(id){ return `https://img.youtube.com/vi/${id}/hqdefault.jpg`; }

  // 동기화를 한 번이라도 성공했으면, 그 이후로는 유튜브에서 불러온 영상만 노출
  function visibleVideos(){
    return ytConfig.hasSynced ? videos.filter(v => v.source === 'yt') : videos;
  }

  // ---------- Hero ----------
  function renderHero(){
    const sorted = visibleVideos().slice().sort((a,b) => b.date.localeCompare(a.date));
    const hero = document.getElementById('hero');
    if(!sorted.length){
      hero.style.backgroundImage = '';
      document.getElementById('heroTitle').textContent = '등록된 영상이 없어요';
      document.getElementById('heroTeam').textContent = '-';
      document.getElementById('heroDate').textContent = '-';
      document.getElementById('heroDesc').textContent = '관리자 모드에서 첫 영상을 추가해 보세요.';
      return null;
    }
    const v = sorted[0];
    hero.style.backgroundImage = `url(${thumb(v.youtubeId)})`;
    document.getElementById('heroTitle').textContent = v.title;
    document.getElementById('heroTeam').textContent = v.team;
    document.getElementById('heroDate').textContent = fmtDate(v.date);
    document.getElementById('heroDesc').textContent = v.desc || '';
    return v;
  }

  // ---------- Rows ----------
  function teamOrderList(){
    const present = Array.from(new Set(visibleVideos().map(v => v.team)));
    const known = TEAM_ORDER.filter(t => present.includes(t));
    const extra = present.filter(t => !TEAM_ORDER.includes(t)).sort();
    return [...known, ...extra];
  }

  function makeCard(v){
    const card = document.createElement('div');
    card.className = 'vcard';
    card.innerHTML = `
      <div class="thumb">
        <img src="${thumb(v.youtubeId)}" alt="${v.title}" loading="lazy">
        <div class="play-hover">
          <svg width="40" height="40" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.9)" stroke-width="1.2"/><path d="M10 8.5L16 12L10 15.5V8.5Z" fill="#fff"/></svg>
        </div>
        ${adminMode ? `<div class="vcard-admin">
          <button class="edit" title="수정">✎</button>
          <button class="del" title="삭제">🗑</button>
        </div>` : ''}
      </div>
      <div class="vcard-info">
        <p class="vtitle">${v.title}</p>
        <div class="vmeta"><span>${v.team}</span><span class="dot"></span><span>${fmtDate(v.date)}</span></div>
      </div>
    `;
    card.querySelector('.thumb').addEventListener('click', (e) => {
      if(e.target.closest('.vcard-admin')) return;
      openPlayer(v);
    });
    if(adminMode){
      card.querySelector('.edit').onclick = (e) => { e.stopPropagation(); openEdit(v.id); };
      card.querySelector('.del').onclick = (e) => { e.stopPropagation(); deleteVideo(v.id); };
    }
    return card;
  }

  function makeRow(title, list, rowId){
    const block = document.createElement('div');
    block.className = 'row-block';
    block.innerHTML = `
      <div class="row-head"><h2>${title}</h2><span class="row-count">${list.length}개</span></div>
      <div class="row-wrap">
        <button class="row-arrow left" data-row="${rowId}">‹</button>
        <div class="row-scroll" id="scroll-${rowId}"></div>
        <button class="row-arrow right" data-row="${rowId}">›</button>
      </div>
    `;
    const scrollEl = block.querySelector('.row-scroll');
    if(list.length){
      list.forEach(v => scrollEl.appendChild(makeCard(v)));
    } else {
      const empty = document.createElement('div');
      empty.className = 'empty-row';
      empty.textContent = '아직 등록된 영상이 없어요.';
      scrollEl.replaceWith(empty);
    }
    block.querySelectorAll('.row-arrow').forEach(btn => {
      btn.onclick = () => {
        const s = document.getElementById('scroll-' + rowId);
        if(!s) return;
        const dir = btn.classList.contains('right') ? 1 : -1;
        s.scrollBy({ left: dir * (s.clientWidth * 0.9), behavior: 'smooth' });
      };
    });
    return block;
  }

  function renderRows(){
    const rowsEl = document.getElementById('rows');
    rowsEl.innerHTML = '';
    const pool = visibleVideos();

    if(searchTerm.trim()){
      const filtered = pool.filter(v => v.title.toLowerCase().includes(searchTerm.toLowerCase()))
        .sort((a,b) => b.date.localeCompare(a.date));
      rowsEl.appendChild(makeRow(`"${searchTerm}" 검색 결과`, filtered, 'search'));
      return;
    }

    const latest = pool.slice().sort((a,b) => b.date.localeCompare(a.date)).slice(0, 12);
    rowsEl.appendChild(makeRow('최신 업로드', latest, 'latest'));

    teamOrderList().forEach((team, i) => {
      const list = pool.filter(v => v.team === team).sort((a,b) => b.date.localeCompare(a.date));
      rowsEl.appendChild(makeRow(team, list, 'team' + i));
    });
  }

  function render(){
    const heroVideo = renderHero();
    renderRows();
    document.getElementById('heroPlayBtn').onclick = () => { if(heroVideo) openPlayer(heroVideo); };
  }

  document.getElementById('heroMoreBtn').onclick = () => {
    const first = document.querySelector('.row-block');
    if(first) first.scrollIntoView({ behavior: 'smooth' });
  };

  // ---------- Search ----------
  document.getElementById('searchInput').addEventListener('input', e => {
    searchTerm = e.target.value;
    renderRows();
  });

  // ---------- Nav scroll state ----------
  window.addEventListener('scroll', () => {
    document.getElementById('topnav').classList.toggle('solid', window.scrollY > 40);
  });

  // ---------- Player Modal ----------
  const playerOverlay = document.getElementById('playerOverlay');
  const modalVideoWrap = document.getElementById('modalVideoWrap');
  function openPlayer(v){
    modalVideoWrap.innerHTML = `<button class="modal-close" id="modalClose">✕</button><iframe src="https://www.youtube.com/embed/${v.youtubeId}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
    document.getElementById('modalClose').onclick = closePlayer;
    document.getElementById('modalTitle').textContent = v.title;
    document.getElementById('modalTeam').textContent = v.team;
    document.getElementById('modalDate').textContent = fmtDate(v.date);
    document.getElementById('modalDesc').textContent = v.desc || '';
    playerOverlay.classList.add('show');
  }
  function closePlayer(){
    playerOverlay.classList.remove('show');
    modalVideoWrap.innerHTML = `<button class="modal-close" id="modalClose">✕</button>`;
  }
  playerOverlay.addEventListener('click', e => { if(e.target === playerOverlay) closePlayer(); });
  document.addEventListener('keydown', e => { if(e.key === 'Escape') closePlayer(); });

  // ---------- Admin ----------
  // 주의: 이 비밀번호는 페이지 소스에 그대로 노출됩니다. 완전한 보안이 아니라
  // '아무나 쉽게 못 누르게' 막는 용도예요. 원하는 값으로 바꿔서 사용하세요.
  const ADMIN_PASSCODE = '270703';
  let adminUnlocked = false;

  const adminPanel = document.getElementById('adminPanel');
  const panelOverlay = document.getElementById('panelOverlay');
  const adminToggle = document.getElementById('adminToggle');

  function openAdmin(){
    if(!adminUnlocked){
      const pw = prompt('관리자 비밀번호를 입력하세요');
      if(pw === null) return;
      if(pw !== ADMIN_PASSCODE){ alert('비밀번호가 올바르지 않습니다.'); return; }
      adminUnlocked = true;
    }
    adminPanel.classList.add('open'); panelOverlay.classList.add('show');
    adminMode = true; adminToggle.classList.add('on');
    document.getElementById('ytApiKey').value = ytConfig.apiKey || '';
    document.getElementById('ytChannel').value = ytConfig.channel || '';
    document.getElementById('syncStatus').textContent = ytConfig.lastSync
      ? `마지막 동기화: ${fmtDate(ytConfig.lastSync.slice(0,10))}`
      : '아직 동기화한 적 없어요.';
    renderRows();
  }
  function closeAdminPanel(){
    adminPanel.classList.remove('open'); panelOverlay.classList.remove('show');
    adminMode = false; adminToggle.classList.remove('on');
    resetForm(); renderRows();
  }
  adminToggle.onclick = () => adminMode ? closeAdminPanel() : openAdmin();
  document.getElementById('closeAdmin').onclick = closeAdminPanel;
  panelOverlay.onclick = closeAdminPanel;
  document.getElementById('syncBtn').onclick = syncFromYoutube;

  document.getElementById('fTeam').addEventListener('change', e => {
    document.getElementById('customTeamField').style.display = e.target.value === '__custom' ? 'block' : 'none';
  });

  function resetForm(){
    document.getElementById('videoForm').reset();
    document.getElementById('editId').value = '';
    document.getElementById('customTeamField').style.display = 'none';
    document.getElementById('submitBtn').textContent = '영상 추가';
  }

  function openEdit(id){
    const v = videos.find(x => x.id === id);
    if(!v) return;
    document.getElementById('editId').value = v.id;
    document.getElementById('fTitle').value = v.title;
    const teamSelect = document.getElementById('fTeam');
    if(TEAM_ORDER.includes(v.team)){
      teamSelect.value = v.team;
      document.getElementById('customTeamField').style.display = 'none';
    } else {
      teamSelect.value = '__custom';
      document.getElementById('customTeamField').style.display = 'block';
      document.getElementById('fTeamCustom').value = v.team;
    }
    document.getElementById('fDate').value = v.date;
    document.getElementById('fUrl').value = v.youtubeId;
    document.getElementById('fDesc').value = v.desc || '';
    document.getElementById('submitBtn').textContent = '수정 저장';
    if(!adminPanel.classList.contains('open')) openAdmin();
    adminPanel.scrollTop = 0;
  }

  function deleteVideo(id){
    if(!confirm('이 영상을 목록에서 삭제할까요?')) return;
    videos = videos.filter(v => v.id !== id);
    saveData(); render();
  }

  document.getElementById('videoForm').addEventListener('submit', e => {
    e.preventDefault();
    const ytId = extractYoutubeId(document.getElementById('fUrl').value);
    if(!ytId){ alert('유튜브 URL 또는 11자리 영상 ID를 정확히 입력해 주세요.'); return; }
    const teamVal = document.getElementById('fTeam').value;
    const team = teamVal === '__custom' ? document.getElementById('fTeamCustom').value.trim() : teamVal;
    if(!team){ alert('팀 이름을 입력해 주세요.'); return; }
    const editId = document.getElementById('editId').value;
    const data = {
      title: document.getElementById('fTitle').value.trim(),
      team, date: document.getElementById('fDate').value,
      youtubeId: ytId, desc: document.getElementById('fDesc').value.trim()
    };
    if(editId){
      const idx = videos.findIndex(v => v.id === editId);
      videos[idx] = { ...videos[idx], ...data };
    } else {
      videos.push({ id: 'v' + Date.now(), ...data });
    }
    saveData(); resetForm(); render();
  });

  document.getElementById('exportBtn').onclick = () => {
    const blob = new Blob([JSON.stringify(videos, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'team_video_archive_export.json'; a.click();
  };
  document.getElementById('importBtn').onclick = () => document.getElementById('fileImport').click();
  document.getElementById('fileImport').addEventListener('change', e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if(!Array.isArray(parsed)) throw new Error('invalid');
        videos = parsed; saveData(); render();
        alert('불러오기 완료: ' + parsed.length + '개 영상');
      } catch(err){ alert('JSON 파일을 읽는 데 실패했어요. 형식을 확인해 주세요.'); }
    };
    reader.readAsText(file); e.target.value = '';
  });
  document.getElementById('resetBtn').onclick = () => {
    if(!confirm('저장된 모든 영상 데이터를 초기 상태로 되돌릴까요? 이 작업은 되돌릴 수 없어요.')) return;
    videos = SEED_DATA; saveData();
    ytConfig.hasSynced = false; saveConfig(ytConfig);
    render();
  };

  render();
</script>
</body>
</html>
