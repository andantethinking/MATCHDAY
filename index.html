<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경기 영상 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0A0A0A;
    --nav-bg-solid: rgba(15,15,15,0.96);
    --card: #181818;
    --text: #FFFFFF;
    --muted: #B3B3B3;
    --muted-2: #7A7A7A;
    --accent: #E1442F;
    --accent-dim: #A9331F;
    --line: #2C2C2C;
  }
  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0; background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  ::selection{ background: var(--accent); color: #fff; }
  ::-webkit-scrollbar{ height: 8px; width: 8px; }
  ::-webkit-scrollbar-thumb{ background: #333; border-radius: 4px; }
  a, button{ font-family: inherit; }

  /* -------- Top Nav -------- */
  .topnav{
    position: fixed; top:0; left:0; right:0; z-index: 100;
    display:flex; align-items:center; gap: 20px;
    padding: 16px 44px;
    background: linear-gradient(180deg, rgba(0,0,0,0.75) 0%, transparent 100%);
    transition: background .25s ease;
  }
  .topnav.solid{ background: var(--nav-bg-solid); }
  .brand{ font-weight: 800; font-size: 21px; letter-spacing: -0.02em; color: var(--accent); margin-right: 8px; white-space: nowrap; }
  .nav-search{
    flex: 1; max-width: 320px;
    display:flex; align-items:center; gap: 8px;
    background: rgba(0,0,0,0.55);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 12px;
  }
  .nav-search svg{ flex-shrink:0; opacity: .6; }
  .nav-search input{ background: transparent; border: none; outline: none; color: var(--text); font-size: 13.5px; width: 100%; }
  .nav-search input::placeholder{ color: var(--muted-2); }
  .nav-refresh{
    margin-left: auto;
    background: transparent; border: 1px solid var(--line); color: var(--muted);
    font-size: 12.5px; padding: 8px 14px; border-radius: 6px; cursor: pointer;
    white-space: nowrap; display:flex; align-items:center; gap:6px;
  }
  .nav-refresh:hover{ color: var(--text); border-color: var(--muted); }
  .nav-refresh.spinning svg{ animation: spin 0.9s linear infinite; }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .nav-updated{ font-size: 11px; color: var(--muted-2); margin-left: 10px; white-space: nowrap; }

  /* -------- Status banner -------- */
  .status-banner{
    position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
    z-index: 99; max-width: 560px; width: calc(100% - 32px);
    background: #1c1c1c; border: 1px solid var(--line); border-left: 3px solid var(--accent);
    border-radius: 8px; padding: 12px 16px;
    font-size: 13px; color: #ddd; line-height: 1.5;
    display:none;
  }
  .status-banner.show{ display:block; }
  .status-banner b{ color: var(--accent); }

  /* -------- Hero -------- */
  .hero{
    position: relative;
    height: 78vh; min-height: 420px;
    display:flex; align-items:flex-end;
    background-size: cover; background-position: center;
    margin-bottom: 8px;
    background-color: #111;
  }
  .hero::after{
    content:''; position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(10,10,10,0) 35%, rgba(10,10,10,0.55) 72%, var(--bg) 100%),
      linear-gradient(90deg, rgba(10,10,10,0.85) 0%, rgba(10,10,10,0.15) 55%, transparent 80%);
  }
  .hero-content{ position: relative; z-index: 2; padding: 0 44px 56px; max-width: 620px; }
  .hero-badge{
    display:inline-flex; align-items:center; gap: 6px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
    color: var(--accent); text-transform: uppercase; margin-bottom: 14px;
  }
  .hero-badge::before{ content: '●'; font-size: 8px; }
  .hero{ transition: background-image .4s ease; }
  .hero h1{
    font-size: clamp(24px, 3.6vw, 42px); font-weight: 800; line-height: 1.2; letter-spacing: -0.02em;
    margin: 0 0 14px; text-shadow: 0 2px 14px rgba(0,0,0,0.4);
  }
  .hero h1 .title-tag{
    display:block; font-size: 14px; font-weight: 700; letter-spacing: 0.08em;
    color: var(--accent); text-transform: uppercase; margin-bottom: 6px;
  }
  .hero h1 .title-part{ display:block; }
  .hero-dots{ display:flex; gap: 6px; margin-bottom: 16px; }
  .hero-dots span{ width: 22px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.3); cursor:pointer; transition: background .2s ease; }
  .hero-dots span.active{ background: var(--accent); }
  .hero-meta{ display:flex; align-items:center; gap: 10px; margin-bottom: 14px; font-size: 13.5px; color: var(--muted); }
  .hero-meta .team-chip{ color: var(--text); background: rgba(255,255,255,0.12); padding: 3px 10px; border-radius: 4px; font-weight: 600; font-size: 12.5px; }
  .hero-desc{
    font-size: 15px; line-height: 1.6; color: #E5E5E5; margin: 0 0 22px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .hero-actions{ display:flex; gap: 12px; }
  .btn{ display:inline-flex; align-items:center; gap: 8px; font-weight: 700; font-size: 15px; padding: 11px 22px; border-radius: 6px; border: none; cursor: pointer; }
  .btn-play{ background: var(--text); color: #111; }
  .btn-play:hover{ background: #d8d8d8; }
  .btn-more{ background: rgba(109,109,110,0.5); color: var(--text); }
  .btn-more:hover{ background: rgba(109,109,110,0.75); }

  /* -------- Rows -------- */
  .rows{ padding: 6px 0 90px; }
  .row-block{ margin-bottom: 34px; }
  .row-head{ display:flex; align-items:baseline; gap: 10px; padding: 0 44px; margin-bottom: 10px; }
  .row-head h2{ font-size: 18px; font-weight: 700; margin: 0; }
  .row-head .row-count{ font-size: 12px; color: var(--muted-2); }
  .row-wrap{ position: relative; }
  .row-wrap:hover .row-arrow{ opacity: 1; }
  .row-scroll{ display:flex; gap: 6px; overflow-x: auto; scroll-behavior: smooth; padding: 4px 44px 12px; scrollbar-width: none; }
  .row-scroll::-webkit-scrollbar{ display:none; }
  .row-arrow{
    position:absolute; top:0; bottom: 12px; width: 44px;
    display:flex; align-items:center; justify-content:center;
    background: linear-gradient(90deg, var(--bg), transparent);
    border:none; color: var(--text); cursor:pointer;
    opacity: 0; transition: opacity .15s ease; z-index: 5; font-size: 22px;
  }
  .row-arrow.right{ right:0; background: linear-gradient(270deg, var(--bg), transparent); }
  .row-arrow.left{ left:0; }

  /* -------- Video card (최신 업로드 / 검색 / 재생목록 펼침) -------- */
  .vcard{ position: relative; flex: 0 0 260px; border-radius: 6px; overflow: hidden; background: var(--card); cursor: pointer; transition: transform .2s ease, z-index 0s; }
  .vcard:hover{ transform: scale(1.06); z-index: 3; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
  .vcard .thumb{ position:relative; aspect-ratio: 16/9; background:#000; }
  .vcard .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .vcard .thumb .play-hover{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background: rgba(0,0,0,0.25); opacity:0; transition: opacity .15s ease; }
  .vcard:hover .play-hover{ opacity:1; }
  .vcard-info{ padding: 9px 11px 11px; }
  .vcard-info .vmeta{ display:flex; align-items:center; gap: 6px; font-size: 11px; color: var(--muted-2); }
  .vcard-info .vmeta .dot{ width:3px; height:3px; border-radius:50%; background: var(--muted-2); }

  /* -------- Playlist card (팀별 카테고리) -------- */
  .plcard{ position: relative; flex: 0 0 260px; cursor: pointer; padding-top: 6px; padding-right: 6px; }
  .plcard .stack{
    position: absolute; top: 0; right: 0; left: 10px; aspect-ratio: 16/9;
    background: #202020; border-radius: 6px; border: 1px solid #2a2a2a;
    transform: translateY(4px);
  }
  .plcard .stack2{ left: 5px; background: #262626; transform: translateY(2px); z-index: 1; }
  .plcard .plthumb{
    position: relative; z-index: 2; aspect-ratio: 16/9; border-radius: 6px; overflow: hidden;
    background:#000; transition: transform .2s ease; margin-right: 6px;
  }
  .plcard .plthumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .plcard:hover .plthumb{ transform: scale(1.04); }
  .plcard.active .plthumb{ outline: 2px solid var(--accent); outline-offset: -2px; }
  .pl-badge{
    position:absolute; top:7px; left:7px; z-index:3;
    background: rgba(0,0,0,0.72); color:#fff; font-size:10.5px; font-weight:700;
    padding: 3px 7px; border-radius: 4px; display:flex; align-items:center; gap:4px;
    letter-spacing: 0.02em;
  }
  .pl-count{
    position:absolute; top:7px; right:7px; z-index:3;
    background: rgba(0,0,0,0.72); color:#fff; font-size:11px; font-weight:600;
    padding: 3px 7px; border-radius: 4px;
  }
  .plthumb-caption{
    position:absolute; left:0; right:0; bottom:0; z-index:3;
    padding: 26px 10px 8px;
    background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 45%, rgba(0,0,0,0.88) 100%);
    color:#fff;
  }
  .plthumb-caption .title-tag{ display:block; font-size: 9.5px; font-weight:700; letter-spacing:0.04em; color: var(--accent); text-transform: uppercase; margin-bottom: 2px; }
  .plthumb-caption .title-part{ display:block; font-size: 12px; font-weight:600; line-height:1.32; color:#fff; }
  .plcard-info{ padding: 9px 11px 2px 0; position: relative; z-index: 2; }
  .plcard-info .vmeta{ font-size: 11px; color: var(--muted-2); }

  /* -------- Theater 모달 (재생목록 클릭 시 전체 화면 재생) -------- */
  .theater-overlay{
    position: fixed; inset:0; z-index: 200;
    background: rgba(0,0,0,0.92);
    display:flex; align-items:center; justify-content:center;
    padding: 32px;
    opacity:0; pointer-events:none; transition: opacity .2s ease;
  }
  .theater-overlay.show{ opacity:1; pointer-events:auto; }
  .theater-box{
    width: min(1180px, 100%); max-height: 90vh;
    background: #101010; border: 1px solid var(--line); border-radius: 12px;
    display:flex; flex-direction:column; overflow:hidden;
    transform: translateY(14px); transition: transform .2s ease;
  }
  .theater-overlay.show .theater-box{ transform: translateY(0); }
  .theater-header{
    display:flex; align-items:center; gap:12px;
    padding: 16px 20px; border-bottom: 1px solid var(--line); flex: 0 0 auto;
  }
  .theater-header h2{ font-size: 15px; font-weight: 700; color: var(--muted); margin:0; }
  .theater-close{ margin-left:auto; background:none; border:none; color: var(--muted); font-size:20px; cursor:pointer; line-height:1; }
  .theater-close:hover{ color: var(--text); }
  .theater-body{ display:flex; flex: 1; min-height:0; }
  .theater-player{ flex: 1 1 66%; min-width:0; display:flex; flex-direction:column; overflow-y:auto; }
  .theater-video{ aspect-ratio: 16/9; background:#000; flex: 0 0 auto; }
  .theater-video iframe{ width:100%; height:100%; border:0; }
  .theater-info{ padding: 18px 22px 22px; }
  .theater-info h3{ font-size: 19px; font-weight: 700; margin: 0 0 8px; line-height:1.3; }
  .theater-info h3 .title-tag{ display:block; font-size: 12px; font-weight:700; letter-spacing:0.06em; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
  .theater-info h3 .title-part{ display:block; }
  .theater-info .theater-meta{ font-size: 12.5px; color: var(--muted-2); margin-bottom: 10px; }
  .theater-info p{ font-size: 13.5px; color: #ccc; line-height:1.6; margin:0; }
  .notice-360{
    display:flex; align-items:center; flex-wrap:wrap; gap: 10px;
    background: rgba(232,179,61,0.1); border: 1px solid rgba(232,179,61,0.35);
    border-radius: 7px; padding: 10px 12px; margin-bottom: 12px;
    font-size: 12.5px; color: #f0d18a; line-height:1.5;
  }
  .notice-360 a{
    color: #111; background: #f0d18a; text-decoration:none; font-weight:700;
    padding: 5px 11px; border-radius: 5px; font-size: 12px; white-space:nowrap;
  }
  .notice-360 a:hover{ background: #ffe0a0; }
  .badge-360{
    position:absolute; top:7px; right:7px; z-index:3;
    background: rgba(0,0,0,0.75); color:#f0d18a; font-size:9.5px; font-weight:700;
    padding: 2px 6px; border-radius: 4px; letter-spacing:0.02em;
  }
  .theater-list{
    flex: 0 0 340px; border-left: 1px solid var(--line);
    overflow-y: auto; padding: 8px;
  }

  /* 넷플릭스 "회차 목록" 느낌의 세로형 에피소드 리스트 (theater 사이드바에서 사용) */
  .ep-item{
    display:flex; align-items:center; gap: 12px;
    padding: 10px 8px;
    cursor: pointer;
    border-radius: 6px;
    border-left: 3px solid transparent;
    transition: background .15s ease;
  }
  .ep-item:hover{ background: rgba(255,255,255,0.045); }
  .ep-item.active{ background: rgba(225,68,47,0.12); border-left-color: var(--accent); }
  .ep-num{
    flex: 0 0 22px; text-align:center;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; color: var(--muted-2);
    position: relative; height: 20px; display:flex; align-items:center; justify-content:center;
  }
  .ep-item.active .ep-num{ color: var(--accent); }
  .ep-num .n{ transition: opacity .15s ease; }
  .ep-num .p{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; transition: opacity .15s ease; }
  .ep-item:hover .ep-num .n{ opacity:0; }
  .ep-item:hover .ep-num .p{ opacity:1; }
  .ep-thumb{ flex: 0 0 120px; aspect-ratio: 16/9; border-radius: 4px; overflow:hidden; background:#000; position: relative; }
  .ep-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .ep-info{ flex: 1; min-width:0; }
  .ep-title-row{ display:flex; flex-direction:column; gap: 3px; }
  .ep-title{ font-size: 12.5px; font-weight: 600; color: var(--text); line-height:1.35; display:block; }
  .ep-title .title-tag{ display:block; font-size: 9.5px; font-weight:700; letter-spacing:0.04em; color: var(--accent); text-transform: uppercase; margin-bottom: 2px; }
  .ep-title .title-part{ display:block; }
  .ep-date{ font-size: 10.5px; color: var(--muted-2); }

  .empty-row{ padding: 40px 44px; color: var(--muted); text-align:center; border: 1px dashed var(--line); border-radius: 10px; margin: 0 44px; }

  /* -------- Skeleton loading -------- */
  .skeleton{ background: linear-gradient(90deg, #161616 25%, #1f1f1f 37%, #161616 63%); background-size: 400% 100%; animation: shimmer 1.4s ease infinite; }
  @keyframes shimmer{ 0%{ background-position: 100% 50%; } 100%{ background-position: 0 50%; } }
  .skeleton-card{ flex: 0 0 260px; aspect-ratio: 16/9; border-radius: 6px; }

  @media (max-width: 800px){
    .theater-overlay{ padding: 0; }
    .theater-box{ max-height: 100vh; height: 100%; border-radius: 0; }
    .theater-body{ flex-direction: column; }
    .theater-list{ flex: 1; border-left:none; border-top: 1px solid var(--line); }
  }

  @media (max-width: 640px){
    .topnav{ padding: 12px 16px; }
    .nav-search{ max-width: 140px; }
    .ep-thumb{ flex-basis: 96px; }
    .nav-updated{ display:none; }
    .hero-content, .row-head{ padding-left: 16px; padding-right: 16px; }
    .row-scroll{ padding-left: 16px; padding-right: 16px; }
    .hero{ height: 66vh; }
    .vcard, .skeleton-card, .plcard{ flex-basis: 200px; }
  }
</style>
</head>
<body>

<nav class="topnav" id="topnav">
  <div class="brand" id="brandName">MATCHDAY</div>
  <div class="nav-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="영상 제목 검색">
  </div>
  <span class="nav-updated" id="navUpdated"></span>
  <button class="nav-refresh" id="refreshBtn" title="지금 새로고침">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 4v6h-6"/></svg>
    새로고침
  </button>
</nav>

<div class="status-banner" id="statusBanner"></div>

<section class="hero" id="hero">
  <div class="hero-content">
    <p class="hero-badge">최신 업로드</p>
    <h1 id="heroTitle">불러오는 중...</h1>
    <div class="hero-meta">
      <span class="team-chip" id="heroTeam">-</span>
      <span id="heroDate">-</span>
    </div>
    <p class="hero-desc" id="heroDesc"></p>
    <div class="hero-dots" id="heroDots"></div>
    <div class="hero-actions">
      <button class="btn btn-play" id="heroPlayBtn">▶ 유튜브에서 재생</button>
      <button class="btn btn-more" id="heroMoreBtn">전체 영상 보기</button>
    </div>
  </div>
</section>

<div class="rows" id="rows"></div>

<div class="theater-overlay" id="theaterOverlay">
  <div class="theater-box">
    <div class="theater-header">
      <h2 id="theaterPlaylistTitle">-</h2>
      <button class="theater-close" id="theaterClose">✕</button>
    </div>
    <div class="theater-body">
      <div class="theater-player">
        <div class="theater-video" id="theaterVideoWrap"></div>
        <div class="theater-info">
          <h3 id="theaterVideoTitle">-</h3>
          <div class="theater-meta" id="theaterVideoDate">-</div>
          <div class="notice-360" id="notice360" style="display:none;"></div>
          <p id="theaterVideoDesc"></p>
        </div>
      </div>
      <div class="theater-list" id="theaterList"></div>
    </div>
  </div>
</div>

<script>
  // ---------- 설정 ----------
  const SITE_TITLE = "MATCHDAY"; // 원하는 팀/채널 이름으로 변경하세요
  document.getElementById('brandName').textContent = SITE_TITLE;
  document.title = SITE_TITLE + " · 경기 영상 아카이브";

  // 유튜브 Data API 키와 채널 ID
  // 주의: 이 키가 페이지 소스에 그대로 노출되므로, Google Cloud Console에서
  // "HTTP 리퍼러" 제한을 걸어 본인 GitHub Pages 주소에서만 쓰이게 해두세요.
  const YT_API_KEY = 'AIzaSyCqyeeAGa_KzjoTpkYFyLuApdgE_Ppw5KI';
  const YT_CHANNEL = 'UCu7KZfrfGZ7g-e9R6sHS3-w';

  const STORAGE_KEY = 'team_video_archive_cache_v2';
  const TEAM_ORDER = ['Weekdays Futsal', 'ERC', 'Shootdori'];
  const TEAM_ALIASES = {
    'weekdays futsal': 'Weekdays Futsal',
    'weekdays futsa': 'Weekdays Futsal', // 흔한 오타 대응
    'wf': 'Weekdays Futsal',
    'erc': 'ERC',
    'shootdori': 'Shootdori'
  };

  function loadCache(){
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ try { return JSON.parse(raw); } catch(e){} }
    return null;
  }
  function saveCache(list, syncedAt){
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ playlists: list, syncedAt }));
  }

  // teamPlaylists: [{ id, title, team, videos: [{id, title, date, youtubeId, desc}, ...] (재생목록 원래 순서) }]
  let teamPlaylists = [];
  let searchTerm = '';
  let lastSyncedAt = null;
  let theaterPlaylist = null; // 현재 극장 모달에 열려있는 재생목록
  let theaterIndex = 0;       // 현재 재생 중인 영상의 재생목록 내 위치

  function extractTeamFromPlaylistTitle(title){
    // 반각 [ ] 뿐 아니라 전각 [ ]（복사/붙여넣기 시 흔히 섞이는 문자）도 인식
    const m = title.match(/[\[\uFF3B]\s*([^\]\uFF3D]+?)\s*[\]\uFF3D]/);
    if(!m) return null;
    return m[1].trim().replace(/\s+/g, ' ');
  }
  function normalizeTeam(rawTeam, playlistTitle){
    if(playlistTitle && playlistTitle.includes('슛도리')) return 'Shootdori';
    if(!rawTeam) return null;
    const key = rawTeam.trim().toLowerCase().replace(/\s+/g, ' ');
    return TEAM_ALIASES[key] || null;
  }
  function cleanPlaylistTitle(title){
    // 카드에 표시할 때는 [팀명] 부분을 지우고 나머지만 보여줌
    return title.replace(/[\[\uFF3B]\s*[^\]\uFF3D]+?\s*[\]\uFF3D]/, '').trim() || title;
  }
  function fmtDate(d){
    if(!d) return '-';
    const dt = new Date(d + 'T00:00:00');
    return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
  }

  // 영상 제목을 "[대괄호 내용]" 1줄 + "/"로 구분된 나머지 내용을 줄 단위로 분리
  function parseTitle(title){
    const m = title.match(/[\[\uFF3B]\s*([^\]\uFF3D]+?)\s*[\]\uFF3D]/);
    let tag = null, rest = title;
    if(m){
      tag = m[1].trim();
      rest = (title.slice(0, m.index) + title.slice(m.index + m[0].length)).trim();
    }
    let parts = rest.split('/').map(s => s.trim()).filter(Boolean);
    if(!parts.length && rest) parts = [rest];
    // 제목 형식: "[팀명] 게임넘버 / 대진" → 표시 순서: 팀명 / 대진 / 게임넘버
    if(parts.length >= 2){
      parts = [parts[1], parts[0], ...parts.slice(2)];
    }
    return { tag, parts };
  }
  function titleHTML(title){
    const { tag, parts } = parseTitle(title);
    let html = '';
    if(tag) html += `<span class="title-tag">${tag}</span>`;
    parts.forEach(p => { html += `<span class="title-part">${p}</span>`; });
    return html || title;
  }

  // 최고 화질 썸네일 우선 사용. maxresdefault가 없는 영상은 실제로는 존재하지 않는데도
  // 작은 회색 플레이스홀더 이미지(120px 폭)를 반환하는 경우가 있어서, 로드된 이미지의
  // 실제 가로폭을 확인해 너무 작으면 항상 존재하는 고화질 대체 이미지로 바꿔치기함.
  function thumbHighRes(id){ return `https://img.youtube.com/vi/${id}/maxresdefault.jpg`; }
  function thumbStandard(id){ return `https://img.youtube.com/vi/${id}/hqdefault.jpg`; }
  function thumbImg(id, alt){
    return `<img src="${thumbHighRes(id)}" alt="${alt}" loading="lazy"
      onerror="this.onerror=null;this.src='${thumbStandard(id)}'"
      onload="if(this.naturalWidth<=120){this.onload=null;this.src='${thumbStandard(id)}';}">`;
  }
  function setHeroBackground(id){
    const hero = document.getElementById('hero');
    const probe = new Image();
    probe.onload = function(){
      hero.style.backgroundImage = `url(${this.naturalWidth > 120 ? thumbHighRes(id) : thumbStandard(id)})`;
    };
    probe.onerror = function(){
      hero.style.backgroundImage = `url(${thumbStandard(id)})`;
    };
    probe.src = thumbHighRes(id);
  }
  function watchUrl(id){ return `https://www.youtube.com/watch?v=${id}`; }
  function openExternally(youtubeId){
    window.open(watchUrl(youtubeId), '_blank', 'noopener,noreferrer');
  }

  function allVideosFlat(){
    return teamPlaylists.filter(pl => TEAM_ORDER.includes(pl.team)).flatMap(pl => pl.videos);
  }
  function visiblePlaylists(){
    return teamPlaylists.filter(pl => TEAM_ORDER.includes(pl.team) && pl.videos.length);
  }

  function showBanner(html){
    const b = document.getElementById('statusBanner');
    b.innerHTML = html;
    b.classList.add('show');
  }
  function hideBanner(){ document.getElementById('statusBanner').classList.remove('show'); }

  // ---------- YouTube 호출 ----------
  async function ytGet(url){
    const res = await fetch(url);
    const data = await res.json();
    if(data.error){ throw new Error(data.error.message || 'YouTube API 오류'); }
    return data;
  }
  async function resolveChannelId(){
    if(/^UC[a-zA-Z0-9_-]{20,}$/.test(YT_CHANNEL)) return YT_CHANNEL;
    const handle = YT_CHANNEL.startsWith('@') ? YT_CHANNEL : '@' + YT_CHANNEL;
    const data = await ytGet(`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${encodeURIComponent(handle)}&key=${YT_API_KEY}`);
    if(data.items && data.items.length) return data.items[0].id;
    throw new Error('채널을 찾을 수 없어요.');
  }
  async function fetchAllPlaylists(channelId){
    let playlists = [], pageToken = '', guard = 0;
    do {
      const url = `https://www.googleapis.com/youtube/v3/playlists?part=snippet,contentDetails&channelId=${channelId}&maxResults=50&key=${YT_API_KEY}${pageToken ? '&pageToken=' + pageToken : ''}`;
      const data = await ytGet(url);
      playlists = playlists.concat(data.items || []);
      pageToken = data.nextPageToken || '';
      guard++;
    } while(pageToken && guard < 10);
    return playlists;
  }
  async function fetchAllPlaylistItems(playlistId){
    let items = [], pageToken = '', guard = 0;
    do {
      const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${playlistId}&maxResults=50&key=${YT_API_KEY}${pageToken ? '&pageToken=' + pageToken : ''}`;
      const data = await ytGet(url);
      items = items.concat(data.items || []);
      pageToken = data.nextPageToken || '';
      guard++;
    } while(pageToken && guard < 10);
    return items; // playlistItems는 재생목록 내 순서(position) 그대로 반환됨
  }

  // videos.list의 contentDetails.projection 값으로 360도 영상 여부를 확인 (최대 50개씩 배치 조회)
  async function fetch360Map(ids){
    const map = {};
    for(let i = 0; i < ids.length; i += 50){
      const batch = ids.slice(i, i + 50);
      const url = `https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${batch.join(',')}&key=${YT_API_KEY}`;
      const data = await ytGet(url);
      (data.items || []).forEach(item => {
        map[item.id] = !!(item.contentDetails && item.contentDetails.projection === '360');
      });
    }
    return map;
  }

  async function fetchFromYoutube(){
    const channelId = await resolveChannelId();
    const playlists = await fetchAllPlaylists(channelId);

    const matched = playlists
      .map(p => {
        const rawTeam = extractTeamFromPlaylistTitle(p.snippet.title);
        return { id: p.id, title: p.snippet.title, team: normalizeTeam(rawTeam, p.snippet.title) };
      })
      .filter(p => p.team);

    const result = [];
    for(const pl of matched){
      const items = await fetchAllPlaylistItems(pl.id); // 원래 순서 유지 (첫 번째 영상이 배열의 첫 항목)
      const vids = [];
      items.forEach(item => {
        const s = item.snippet, cd = item.contentDetails;
        if(!s || !cd || !cd.videoId) return;
        if(s.title === 'Private video' || s.title === 'Deleted video') return;
        const dateStr = (cd.videoPublishedAt || s.publishedAt || '').slice(0, 10);
        vids.push({
          id: 'yt_' + cd.videoId,
          title: s.title,
          date: dateStr,
          youtubeId: cd.videoId,
          desc: s.description ? s.description.split('\n')[0].slice(0, 160) : ''
        });
      });
      if(vids.length){
        result.push({ id: pl.id, title: cleanPlaylistTitle(pl.title), team: pl.team, videos: vids });
      }
    }

    // 모든 영상의 360도 여부를 한 번에 조회해서 태그
    const allIds = Array.from(new Set(result.flatMap(pl => pl.videos.map(v => v.youtubeId))));
    if(allIds.length){
      try{
        const map360 = await fetch360Map(allIds);
        result.forEach(pl => pl.videos.forEach(v => { v.is360 = !!map360[v.youtubeId]; }));
      } catch(e){
        // 360도 판별에 실패해도 전체 동기화는 계속 진행
      }
    }

    return result;
  }

  async function runSync(isManual){
    const refreshBtn = document.getElementById('refreshBtn');
    refreshBtn.classList.add('spinning');
    if(isManual) hideBanner();
    try{
      const fresh = await fetchFromYoutube();
      if(!fresh.length){
        showBanner('<b>알림</b> 재생목록 제목에서 ERC / Shootdori / Weekdays Futsal로 인식되는 영상을 찾지 못했어요. 재생목록이 공개(Public)로 설정돼 있는지 확인해 주세요.');
      } else {
        hideBanner();
      }
      teamPlaylists = fresh;
      lastSyncedAt = new Date().toISOString();
      saveCache(fresh, lastSyncedAt);
      closeTheater();
      render();
    } catch(err){
      showBanner(`<b>불러오기 실패</b> ${err.message}${teamPlaylists.length ? ' — 이전에 저장된 데이터를 표시하고 있어요.' : ''}`);
    } finally {
      refreshBtn.classList.remove('spinning');
      updateNavTimestamp();
    }
  }

  function updateNavTimestamp(){
    const el = document.getElementById('navUpdated');
    el.textContent = lastSyncedAt ? `업데이트: ${fmtDate(lastSyncedAt.slice(0,10))}` : '';
  }

  // ---------- Hero (최신 5개 영상 5초 간격 순환) ----------
  const HERO_ROTATE_MS = 5000;
  let heroVideos = [];
  let heroIndex = 0;
  let heroTimer = null;
  let heroCurrentVideo = null;

  function stopHeroRotation(){
    if(heroTimer){ clearInterval(heroTimer); heroTimer = null; }
  }

  function showHeroSlide(i){
    heroIndex = i;
    const v = heroVideos[i];
    heroCurrentVideo = v;
    const team = teamPlaylists.find(pl => pl.videos.some(x => x.youtubeId === v.youtubeId));
    setHeroBackground(v.youtubeId);
    document.getElementById('heroTitle').innerHTML = titleHTML(v.title);
    document.getElementById('heroTeam').textContent = team ? team.team : '';
    document.getElementById('heroDate').textContent = fmtDate(v.date);
    document.getElementById('heroDesc').textContent = v.desc || '';
    document.querySelectorAll('#heroDots span').forEach((dot, idx) => dot.classList.toggle('active', idx === i));
  }

  function startHeroRotation(){
    stopHeroRotation();
    const sorted = allVideosFlat().slice().sort((a,b) => b.date.localeCompare(a.date));
    heroVideos = sorted.slice(0, 5);
    const hero = document.getElementById('hero');
    const dotsEl = document.getElementById('heroDots');

    if(!heroVideos.length){
      hero.style.backgroundImage = '';
      document.getElementById('heroTitle').textContent = teamPlaylists.length === 0 && !lastSyncedAt ? '불러오는 중...' : '표시할 영상이 없어요';
      document.getElementById('heroTeam').textContent = '-';
      document.getElementById('heroDate').textContent = '-';
      document.getElementById('heroDesc').textContent = '';
      dotsEl.innerHTML = '';
      heroCurrentVideo = null;
      return;
    }

    dotsEl.innerHTML = heroVideos.map((_, i) => `<span data-i="${i}"></span>`).join('');
    dotsEl.querySelectorAll('span').forEach(dot => {
      dot.addEventListener('click', () => {
        showHeroSlide(Number(dot.dataset.i));
        stopHeroRotation();
        if(heroVideos.length > 1) heroTimer = setInterval(advanceHero, HERO_ROTATE_MS);
      });
    });

    showHeroSlide(0);
    if(heroVideos.length > 1){
      heroTimer = setInterval(advanceHero, HERO_ROTATE_MS);
    }
  }

  function advanceHero(){
    showHeroSlide((heroIndex + 1) % heroVideos.length);
  }

  // ---------- Rows ----------
  function teamOrderList(){
    const present = Array.from(new Set(visiblePlaylists().map(pl => pl.team)));
    return TEAM_ORDER.filter(t => present.includes(t));
  }

  function makeVideoCard(v){
    const card = document.createElement('div');
    card.className = 'vcard';
    card.innerHTML = `
      <div class="thumb">
        ${thumbImg(v.youtubeId, v.title)}
        ${v.is360 ? '<span class="badge-360">360°</span>' : ''}
        <div class="play-hover">
          <svg width="40" height="40" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.9)" stroke-width="1.2"/><path d="M10 8.5L16 12L10 15.5V8.5Z" fill="#fff"/></svg>
        </div>
        <div class="plthumb-caption">${titleHTML(v.title)}</div>
      </div>
      <div class="vcard-info">
        <div class="vmeta"><span>${fmtDate(v.date)}</span></div>
      </div>
    `;
    card.querySelector('.thumb').addEventListener('click', () => openExternally(v.youtubeId));
    return card;
  }

  function makePlaylistCard(pl){
    const card = document.createElement('div');
    card.className = 'plcard' + (theaterPlaylist && theaterPlaylist.id === pl.id ? ' active' : '');
    const first = pl.videos[0];
    const latest = pl.videos.slice().sort((a,b) => b.date.localeCompare(a.date))[0];
    card.innerHTML = `
      <div class="stack"></div>
      <div class="stack stack2"></div>
      <div class="plthumb">
        ${thumbImg(first.youtubeId, first.title)}
        <span class="pl-badge">≡ 재생목록</span>
        <span class="pl-count">${pl.videos.length}개</span>
        ${first.is360 ? '<span class="badge-360" style="right:auto; left:7px; top:32px; bottom:auto;">360°</span>' : ''}
        <div class="plthumb-caption">${titleHTML(first.title)}</div>
      </div>
      <div class="plcard-info">
        <div class="vmeta">최신 ${fmtDate(latest.date)}</div>
      </div>
    `;
    card.addEventListener('click', () => openTheater(pl));
    return card;
  }

  // ---------- Theater 모달 (재생목록 클릭 시 어두운 배경 + 좌측 재생 + 우측 리스트) ----------
  function openTheater(pl){
    theaterPlaylist = pl;
    theaterIndex = 0;
    renderTheater();
    document.getElementById('theaterOverlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeTheater(){
    theaterPlaylist = null;
    theaterIndex = 0;
    document.getElementById('theaterOverlay').classList.remove('show');
    document.getElementById('theaterVideoWrap').innerHTML = '';
    document.body.style.overflow = '';
  }
  function selectTheaterVideo(index){
    theaterIndex = index;
    renderTheaterMain();
    renderTheaterList();
  }
  function renderTheaterMain(){
    const v = theaterPlaylist.videos[theaterIndex];
    document.getElementById('theaterVideoWrap').innerHTML =
      `<iframe src="https://www.youtube.com/embed/${v.youtubeId}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen; web-share" allowfullscreen></iframe>`;
    document.getElementById('theaterVideoTitle').innerHTML = titleHTML(v.title);
    document.getElementById('theaterVideoDate').textContent = fmtDate(v.date);
    document.getElementById('theaterVideoDesc').textContent = v.desc || '';
    const notice = document.getElementById('notice360');
    if(v.is360){
      notice.style.display = 'flex';
      notice.innerHTML = `<span>🌐 360° 영상이에요. 이 안에서 드래그해도 화면이 잘 안 움직이면, 유튜브에서 직접 보면 정상적으로 화면을 움직일 수 있어요.</span><a href="${watchUrl(v.youtubeId)}" target="_blank" rel="noopener noreferrer">유튜브에서 360°로 보기</a>`;
    } else {
      notice.style.display = 'none';
      notice.innerHTML = '';
    }
  }
  function renderTheaterList(){
    document.getElementById('theaterPlaylistTitle').textContent = `${theaterPlaylist.title} · ${theaterPlaylist.videos.length}개 영상`;
    const listEl = document.getElementById('theaterList');
    listEl.innerHTML = '';
    theaterPlaylist.videos.forEach((v, i) => { // 재생목록 원래 순서 그대로 (첫 영상이 1번)
      const item = document.createElement('div');
      item.className = 'ep-item' + (i === theaterIndex ? ' active' : '');
      item.innerHTML = `
        <div class="ep-num">
          <span class="n">${i + 1}</span>
          <span class="p"><svg width="14" height="14" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="${i === theaterIndex ? 'var(--accent)' : '#fff'}"/></svg></span>
        </div>
        <div class="ep-thumb">${thumbImg(v.youtubeId, v.title)}${v.is360 ? '<span class="badge-360">360°</span>' : ''}</div>
        <div class="ep-info">
          <div class="ep-title-row">
            <span class="ep-title">${titleHTML(v.title)}</span>
            <span class="ep-date">${fmtDate(v.date)}</span>
          </div>
        </div>
      `;
      item.addEventListener('click', () => selectTheaterVideo(i));
      listEl.appendChild(item);
    });
  }
  function renderTheater(){
    renderTheaterMain();
    renderTheaterList();
  }
  document.getElementById('theaterClose').onclick = closeTheater;
  document.getElementById('theaterOverlay').addEventListener('click', e => {
    if(e.target.id === 'theaterOverlay') closeTheater();
  });
  document.addEventListener('keydown', e => {
    if(e.key === 'Escape' && theaterPlaylist) closeTheater();
  });

  function makeRow(title, items, rowId, isPlaylistRow){
    const block = document.createElement('div');
    block.className = 'row-block';
    block.innerHTML = `
      <div class="row-head"><h2>${title}</h2><span class="row-count">${items.length}개</span></div>
      <div class="row-wrap">
        <button class="row-arrow left" data-row="${rowId}">‹</button>
        <div class="row-scroll" id="scroll-${rowId}"></div>
        <button class="row-arrow right" data-row="${rowId}">›</button>
      </div>
    `;
    const scrollEl = block.querySelector('.row-scroll');
    if(items.length){
      items.forEach(item => scrollEl.appendChild(isPlaylistRow ? makePlaylistCard(item) : makeVideoCard(item)));
    } else {
      const empty = document.createElement('div');
      empty.className = 'empty-row';
      empty.textContent = '아직 등록된 영상이 없어요.';
      scrollEl.replaceWith(empty);
    }
    block.querySelectorAll('.row-arrow').forEach(btn => {
      btn.onclick = () => {
        const s = document.getElementById('scroll-' + rowId);
        if(!s) return;
        const dir = btn.classList.contains('right') ? 1 : -1;
        s.scrollBy({ left: dir * (s.clientWidth * 0.9), behavior: 'smooth' });
      };
    });
    return block;
  }

  function makeSkeletonRow(title){
    const block = document.createElement('div');
    block.className = 'row-block';
    const cards = Array.from({length: 5}).map(() => '<div class="vcard skeleton skeleton-card"></div>').join('');
    block.innerHTML = `
      <div class="row-head"><h2>${title}</h2></div>
      <div class="row-scroll" style="overflow:hidden;">${cards}</div>
    `;
    return block;
  }

  function renderRows(){
    const rowsEl = document.getElementById('rows');
    rowsEl.innerHTML = '';

    if(!teamPlaylists.length && !lastSyncedAt){
      TEAM_ORDER.forEach(t => rowsEl.appendChild(makeSkeletonRow(t)));
      return;
    }

    if(searchTerm.trim()){
      const filtered = allVideosFlat().filter(v => v.title.toLowerCase().includes(searchTerm.toLowerCase()))
        .sort((a,b) => b.date.localeCompare(a.date));
      rowsEl.appendChild(makeRow(`"${searchTerm}" 검색 결과`, filtered, 'search', false));
      return;
    }

    const latest = allVideosFlat().slice().sort((a,b) => b.date.localeCompare(a.date)).slice(0, 12);
    rowsEl.appendChild(makeRow('최신 업로드', latest, 'latest', false));

    teamOrderList().forEach((team, i) => {
      const list = visiblePlaylists().filter(pl => pl.team === team)
        .sort((a,b) => {
          const aLatest = a.videos.slice().sort((x,y) => y.date.localeCompare(x.date))[0].date;
          const bLatest = b.videos.slice().sort((x,y) => y.date.localeCompare(x.date))[0].date;
          return bLatest.localeCompare(aLatest);
        });
      rowsEl.appendChild(makeRow(team, list, 'team' + i, true));
    });
  }

  function render(){
    startHeroRotation();
    renderRows();
    document.getElementById('heroPlayBtn').onclick = () => { if(heroCurrentVideo) openExternally(heroCurrentVideo.youtubeId); };
  }

  document.getElementById('heroMoreBtn').onclick = () => {
    const first = document.querySelector('.row-block');
    if(first) first.scrollIntoView({ behavior: 'smooth' });
  };

  // ---------- Search ----------
  document.getElementById('searchInput').addEventListener('input', e => {
    searchTerm = e.target.value;
    closeTheater();
    renderRows();
  });

  // ---------- Nav scroll state ----------
  window.addEventListener('scroll', () => {
    document.getElementById('topnav').classList.toggle('solid', window.scrollY > 40);
  });

  // ---------- 새로고침 버튼 ----------
  document.getElementById('refreshBtn').onclick = () => {
    localStorage.removeItem(STORAGE_KEY);
    teamPlaylists = [];
    lastSyncedAt = null;
    closeTheater();
    render(); // 캐시가 없는 상태이므로 로딩 스켈레톤부터 다시 보여줌
    runSync(true);
  };

  // ---------- 초기 로드 ----------
  (function init(){
    const cached = loadCache();
    if(cached && cached.playlists && cached.playlists.length){
      teamPlaylists = cached.playlists;
      lastSyncedAt = cached.syncedAt;
      updateNavTimestamp();
      render();
    }
    runSync(false);
  })();
</script>
</body>
</html>
